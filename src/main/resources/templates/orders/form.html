<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f8f9fa; font-family: Tahoma, sans-serif; }
.menu-card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
.qty-input { width: 50px; text-align: center; border: none; background: transparent; font-weight: bold; }
.btn-qty { width: 35px; height: 35px; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; padding: 0; }
.order-sidebar { position: sticky; top: 20px; }
.table-header { background: linear-gradient(135deg, #ff9800, #f44336); color: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
</style>
</head>
<body>
    <div class="container py-4">
        <div class="table-header shadow-sm d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0">The Star MooKaTa</h2>
                <p class="mb-0">Ordering for <strong id="tableName">Table ...</strong></p>
            </div>
            <a href="/tables" class="btn btn-outline-light btn-sm">Change Table</a>
        </div>

        <div id="successMessage" class="alert alert-success d-none"></div>
        <div id="errorMessage" class="alert alert-danger d-none"></div>

        <form id="orderForm">
            <div class="row">
                <div class="col-lg-8">
                    <h4 class="mb-3">Menu</h4>
                    <div id="productGrid" class="row g-3">
                        <p class="text-muted">Loading menu...</p>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card order-sidebar shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <h5 class="text-center">Current Order</h5>
                            <hr>
                            <div id="pastOrdersList" class="mb-4" style="max-height: 350px; overflow-y: auto;">
                                <p class="text-muted small text-center">Loading current items...</p>
                            </div>

                            <div class="text-center">
                                <h5>Add Items</h5>
                                <hr>
                                <p class="text-muted small">Select quantities and submit to add another order round.</p>
                                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow">Submit Order</button>
                                <a href="/tables" class="btn btn-link mt-2 text-decoration-none text-muted d-block text-center">Back to Tables</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const tableId = window.location.pathname.split('/').filter(Boolean).pop();
        const tableName = document.getElementById('tableName');
        const productGrid = document.getElementById('productGrid');
        const pastOrdersList = document.getElementById('pastOrdersList');
        const orderForm = document.getElementById('orderForm');
        const successBox = document.getElementById('successMessage');
        const errorBox = document.getElementById('errorMessage');

        tableName.textContent = `Table ${tableId}`;

        function showMessage(type, text) {
            const target = type === 'success' ? successBox : errorBox;
            const other = type === 'success' ? errorBox : successBox;
            other.classList.add('d-none');
            other.textContent = '';
            target.textContent = text;
            target.classList.remove('d-none');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function increaseQty(productId) {
            const input = document.querySelector(`[data-product-id="${productId}"]`);
            input.value = Number(input.value) + 1;
        }

        function decreaseQty(productId) {
            const input = document.querySelector(`[data-product-id="${productId}"]`);
            input.value = Math.max(0, Number(input.value) - 1);
        }

        async function loadOrderPageData() {
            productGrid.innerHTML = '<p class="text-muted">Loading menu...</p>';
            pastOrdersList.innerHTML = '<p class="text-muted small text-center">Loading current items...</p>';

            try {
                const response = await fetch(`/api/orders/table/${tableId}`);
                if (!response.ok) {
                    throw new Error('Unable to load order page data');
                }

                const data = await response.json();
                renderProducts(data.products || []);
                renderAggregatedOrders(data.aggregatedOrders || []);
            } catch (error) {
                productGrid.innerHTML = '<p class="text-danger">Failed to load menu.</p>';
                pastOrdersList.innerHTML = '<p class="text-danger small text-center">Failed to load current order.</p>';
                showMessage('error', error.message);
            }
        }

        function renderProducts(products) {
            if (!products.length) {
                productGrid.innerHTML = '<p class="text-muted">No available products.</p>';
                return;
            }

            productGrid.innerHTML = products.map((product) => `
                <div class="col-md-6 col-xl-4">
                    <div class="card menu-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(product.productName)}</h5>
                            <p class="text-danger fw-bold mb-3">${escapeHtml(product.productPrice)} THB</p>
                            <div class="d-flex align-items-center justify-content-center bg-light rounded-pill p-1">
                                <button type="button" class="btn btn-white btn-qty shadow-sm" onclick="decreaseQty(${Number(product.productId)})">-</button>
                                <input type="number" value="0" min="0" class="qty-input" readonly data-product-id="${Number(product.productId)}">
                                <button type="button" class="btn btn-white btn-qty shadow-sm" onclick="increaseQty(${Number(product.productId)})">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAggregatedOrders(items) {
            if (!items.length) {
                pastOrdersList.innerHTML = '<p class="text-muted small text-center">No items ordered yet.</p>';
                return;
            }

            pastOrdersList.innerHTML = `
                <div class="card border-0 bg-light shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="fw-bold text-primary mb-3">Already Ordered</h6>
                        ${items.map((item) => `
                            <div class="d-flex justify-content-between small border-bottom py-2">
                                <span>${escapeHtml(item.product.productName)}</span>
                                <span class="fw-bold text-danger">x${escapeHtml(item.quantity)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        orderForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const quantities = {};
            document.querySelectorAll('[data-product-id]').forEach((input) => {
                const quantity = Number(input.value);
                if (quantity > 0) {
                    quantities[Number(input.dataset.productId)] = quantity;
                }
            });

            if (!Object.keys(quantities).length) {
                showMessage('error', 'Select at least one item before submitting.');
                return;
            }

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tableId: Number(tableId), quantities })
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.message || 'Unable to create order');
                }

                showMessage('success', payload.message);
                await loadOrderPageData();
            } catch (error) {
                showMessage('error', error.message);
            }
        });

        loadOrderPageData();
    </script>
</body>
</html>
