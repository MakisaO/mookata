<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สั่งอาหาร - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	background-color: #f8f9fa;
	font-family: 'Kanit', sans-serif;
}

.menu-card {
	border: none;
	border-radius: 15px;
	transition: transform 0.2s;
	overflow: hidden;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
}

.menu-card:hover {
	transform: translateY(-5px);
}

.qty-input {
	width: 50px;
	text-align: center;
	border: none;
	background: transparent;
	font-weight: bold;
}

.btn-qty {
	width: 35px;
	height: 35px;
	border-radius: 50% !important;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0;
}

.order-sidebar {
	position: sticky;
	top: 20px;
}

.table-header {
	background: linear-gradient(135deg, #ff9800, #f44336);
	color: white;
	padding: 20px;
	border-radius: 15px;
	margin-bottom: 30px;
}

#loading-overlay {
    text-align: center;
    padding: 50px;
}
</style>
</head>
<body>

	<div class="container py-4">
		<div class="table-header shadow-sm d-flex justify-content-between align-items-center">
			<div>
				<h2 class="mb-0">🎇🎇🎇 The Star MooKaTa 🎇🎇🎇</h2>
				<p class="mb-0" id="tableInfoText">
					กำลังดึงข้อมูลโต๊ะ...
				</p>
			</div>
			<a href="/tables" class="btn btn-outline-light btn-sm">เปลี่ยนโต๊ะ</a>
		</div>

        <div id="loading-overlay">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">กำลังโหลดเมนูอาหาร...</p>
        </div>

		<div id="main-content" style="display: none;">
			<div class="row">
				<div class="col-lg-8">
					<h4 class="mb-3">เมนูอาหาร</h4>
                    <div id="categoryContainer" class="mb-4">
                        <!-- Categories will load here -->
                    </div>
					<div class="row g-3" id="menuContainer">
						<!-- เมนูจะโหลดผ่าน JS -->
					</div>
				</div>

				<div class="col-lg-4">
					<div class="card order-sidebar shadow-sm border-0 rounded-4">
						<div class="card-body p-4">
							<h5 class="text-center">📋 รายการที่สั่งไปแล้ว</h5>
							<hr>

							<div class="past-orders-list mb-4" id="pastOrdersContainer"
								style="max-height: 350px; overflow-y: auto;">
								<!-- รายการที่สั่งไปแล้วจะโหลดผ่าน JS -->
							</div>

							<div class="text-center">
								<h5>🛒 สั่งอาหารเพิ่ม</h5>
								<hr>
								<p class="text-muted small">
									เลือกรายการอาหาร<br>แล้วกดปุ่มเพื่อสั่งเพิ่ม
								</p>
								<button type="button" id="submitOrderBtn"
									class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow">
									ส่งรายการอาหาร</button>
								<a href="/"
									class="btn btn-link mt-2 text-decoration-none text-muted d-block text-center">กลับหน้าหลัก</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
    const API_BASE = '/api/orders';
    
    // ดึง tableId จาก URL เช่น /orders/5
    const pathParts = window.location.pathname.split('/');
    const tableId = pathParts[pathParts.length - 1];

    let productsList = [];
    let selectedQuantities = {}; // เก็บจำนวนที่เลือกไว้ ไม่ให้หายเวลาเปลี่ยนหมวดหมู่

    async function initPage() {
        if (!tableId || isNaN(tableId)) {
            alert('ไม่พบรหัสโต๊ะ');
            window.location.href = '/tables';
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/${tableId}`);
            if (!response.ok) throw new Error('Failed to load data');
            const data = await response.json();

            document.getElementById('tableInfoText').innerHTML = `กำลังสั่งอาหารสำหรับ: <strong>โต๊ะ ${tableId}</strong>`;
            
            productsList = data.products;
            renderCategories(data.categories, data.activeCategoryId);
            renderMenu(data.products);
            renderPastOrders(data.aggregatedOrders);

            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาดในการโหลดข้อมูล');
        }
    }

    function renderCategories(categories, activeCategoryId) {
        const container = document.getElementById('categoryContainer');
        if (!container) return;
        container.innerHTML = '';
        
        const allBtn = document.createElement('button');
        allBtn.className = `btn btn-sm me-2 mb-2 ${activeCategoryId == null ? 'btn-dark' : 'btn-outline-dark'}`;
        allBtn.innerText = 'ทั้งหมด';
        allBtn.onclick = () => filterByCategory(null);
        container.appendChild(allBtn);
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `btn btn-sm me-2 mb-2 ${activeCategoryId == cat.categoriesId ? 'btn-dark' : 'btn-outline-dark'}`;
            btn.innerText = cat.categoriesName;
            btn.onclick = () => filterByCategory(cat.categoriesId);
            container.appendChild(btn);
        });
    }

    async function filterByCategory(catId) {
        try {
            // เก็บค่า qty ปัจจุบันไว้ก่อนเปลี่ยนหมวดหมู่
            const currentInputs = document.querySelectorAll('.qty-input');
            currentInputs.forEach(input => {
                const pid = input.id.replace('qty_', '');
                selectedQuantities[pid] = parseInt(input.value);
            });

            const response = await fetch(`${API_BASE}/${tableId}?categoryId=${catId || ''}`);
            const data = await response.json();
            
            productsList = data.products;
            renderMenu(data.products);
            renderCategories(data.categories, data.activeCategoryId);
        } catch (error) {
            console.error('Error filtering categories:', error);
        }
    }

    function renderMenu(products) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';

        products.forEach(p => {
            const qty = selectedQuantities[p.productId] || 0;
            const col = document.createElement('div');
            col.className = 'col-md-6 col-xl-4';
            col.innerHTML = `
                <div class="card menu-card h-100">
                    <div class="card-body">
                        <h5 class="card-title">${p.productName}</h5>
                        <p class="text-danger fw-bold mb-3">${p.productPrice} บาท</p>

                        <div class="d-flex align-items-center justify-content-center bg-light rounded-pill p-1">
                            <button type="button" class="btn btn-white btn-qty shadow-sm" onclick="decreaseQty(this, ${p.productId})">-</button>
                            <input type="number" id="qty_${p.productId}" value="${qty}" min="0" class="qty-input" readonly>
                            <button type="button" class="btn btn-white btn-qty shadow-sm" onclick="increaseQty(this, ${p.productId})">+</button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(col);
        });
    }

    function renderPastOrders(aggregatedOrders) {
        const container = document.getElementById('pastOrdersContainer');
        
        if (!aggregatedOrders || aggregatedOrders.length === 0) {
            container.innerHTML = `
                <div class="text-center py-4">
                    <p class="text-muted small">ยังไม่มีรายการอาหารที่สั่ง</p>
                </div>`;
            return;
        }

        let html = `
            <div class="card border-0 bg-light shadow-sm">
                <div class="card-body p-3">
                    <h6 class="fw-bold text-primary mb-3">📍 รายการที่สั่งรวม</h6>`;
        
        aggregatedOrders.forEach(summary => {
            html += `
                <div class="d-flex justify-content-between small border-bottom py-2">
                    <span>${summary.product.productName}</span>
                    <span class="fw-bold text-danger">x${summary.quantity}</span>
                </div>`;
        });

        html += `</div></div>`;
        container.innerHTML = html;
    }

    function increaseQty(btn, productId) {
        const input = btn.previousElementSibling;
        const newVal = parseInt(input.value) + 1;
        input.value = newVal;
        selectedQuantities[productId] = newVal;
    }

    function decreaseQty(btn, productId) {
        const input = btn.nextElementSibling;
        if (parseInt(input.value) > 0) {
            const newVal = parseInt(input.value) - 1;
            input.value = newVal;
            selectedQuantities[productId] = newVal;
        }
    }

    // ส่งออเดอร์
    document.getElementById('submitOrderBtn').addEventListener('click', async () => {
        // อัปเดต selectedQuantities จาก input ปัจจุบันก่อนส่ง
        const currentInputs = document.querySelectorAll('.qty-input');
        currentInputs.forEach(input => {
            const pid = input.id.replace('qty_', '');
            selectedQuantities[pid] = parseInt(input.value);
        });

        const quantities = {};
        let hasItems = false;

        for (const [pid, qty] of Object.entries(selectedQuantities)) {
            if (qty > 0) {
                quantities[pid] = qty;
                hasItems = true;
            }
        }

        if (!hasItems) {
            alert('กรุณาเลือกรายการอาหารอย่างน้อย 1 อย่าง');
            return;
        }

        const btn = document.getElementById('submitOrderBtn');
        btn.disabled = true;
        btn.innerText = 'กำลังส่งรายการ...';

        try {
            const response = await fetch(`${API_BASE}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tableId: parseInt(tableId),
                    quantities: quantities
                })
            });

            const result = await response.json();
            if (response.ok) {
                alert(result.message);
                location.reload();
            } else {
                alert(result.message || 'เกิดข้อผิดพลาดในการสั่งอาหาร');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
        } finally {
            btn.disabled = false;
            btn.innerText = 'ส่งรายการอาหาร';
        }
    });

    document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
