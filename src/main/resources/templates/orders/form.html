<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สั่งอาหาร - Mookata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        #loading-overlay { text-align: center; padding: 50px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="bg-gradient-to-r from-orange-500 to-rose-500 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-5 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-bold tracking-wide flex items-center justify-center sm:justify-start gap-2">
                    <i class="fa-solid fa-fire text-yellow-300"></i> The Star MooKaTa <i class="fa-solid fa-fire text-yellow-300"></i>
                </h1>
                <p id="tableInfoText" class="mt-1 text-orange-100 font-medium">กำลังโหลดข้อมูล...</p>
            </div>
            <a href="/tables" class="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-5 py-2 rounded-lg font-medium transition-colors backdrop-blur-sm text-sm whitespace-nowrap">
                <i class="fa-solid fa-arrow-right-arrow-left mr-1"></i> เปลี่ยนโต๊ะ
            </a>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 pt-8">
        <div id="alertContainer"></div>

        <!-- Loading Overlay (จาก HEAD) -->
        <div id="loading-overlay">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-2"></i>
            <p class="text-slate-500">กำลังโหลดเมนูอาหาร...</p>
        </div>

        <div id="main-content" class="hidden flex flex-col lg:flex-row gap-6">
            <div class="flex-1">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center">
                        <i class="fa-solid fa-book-open-reader mr-2 text-blue-600"></i> เลือกเมนูอาหาร
                    </h2>
                </div>

                <div class="flex overflow-x-auto gap-2 mb-6 pb-2 scrollbar-hide" id="categoriesContainer">
                    <!-- Categories -->
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4" id="menuContainer">
                    <!-- Products -->
                </div>
            </div>

            <div class="lg:w-80 xl:w-96 shrink-0">
                <div class="bg-white rounded-3xl shadow-lg border border-slate-100 sticky top-6 overflow-hidden">
                    <div class="bg-slate-800 p-5 text-center">
                        <h5 class="text-white font-bold text-lg flex justify-center items-center gap-2">
                            <i class="fa-solid fa-clipboard-list text-blue-400"></i> บิลปัจจุบัน
                        </h5>
                    </div>

                    <div class="p-5">
                        <div class="mb-6">
                            <p class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider text-center">รายการที่อยู่ในครัว</p>
                            <div id="pastOrdersContainer">
                                <!-- Past Orders -->
                            </div>
                        </div>

                        <hr class="border-slate-100 mb-6">
                        <div class="text-center">
                            <p class="text-slate-500 text-sm mb-4">
                                เลือกจำนวนอาหารในหน้าเมนู<br>แล้วกดปุ่มด้านล่างเพื่อส่งเข้าครัว
                            </p>
                            <button id="submitOrderBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 active:scale-95 flex justify-center items-center gap-2">
                                <i class="fa-solid fa-bell-concierge"></i> ยืนยันสั่งอาหาร
                            </button>
                            <a href="/" class="inline-block mt-4 text-slate-400 hover:text-slate-600 font-medium text-sm transition-colors">
                                <i class="fa-solid fa-house mr-1"></i> กลับหน้าหลัก
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/orders';
        const pathParts = window.location.pathname.split('/');
        const tableId = pathParts[pathParts.length - 1];
        
        let currentCategoryId = null;
        let productsList = [];
        let cartState = {};

        async function initPage() {
            if (!tableId || isNaN(tableId)) {
                alert('ไม่พบรหัสโต๊ะ');
                window.location.href = '/tables';
                return;
            }
            await fetchOrderData();
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }

        async function fetchOrderData() {
            try {
                let url = `${API_BASE}/${tableId}`;
                if (currentCategoryId) url += `?categoryId=${currentCategoryId}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();

                document.getElementById('tableInfoText').innerHTML = `กำลังสั่งอาหารสำหรับ: <span class="bg-white/20 px-2 py-0.5 rounded-md text-white font-bold ml-1">โต๊ะ ${tableId}</span>`;
                
                productsList = data.products;
                renderCategories(data.categories, data.activeCategoryId);
                renderMenu(data.products);
                renderPastOrders(data.aggregatedOrders);

            } catch (error) {
                console.error('Error:', error);
                showAlert('เกิดข้อผิดพลาดในการโหลดข้อมูล', 'error');
            }
        }

        function getEmojiForProduct(name) {
            name = name.toLowerCase();
            if (name.includes('สามชั้น') || name.includes('เบคอน')) return '🥓';
            if (name.includes('กุ้ง')) return '🦐';
            if (name.includes('หมึก')) return '🦑';
            if (name.includes('ไข่')) return '🥚';
            if (name.includes('ชีส')) return '🧀';
            if (name.includes('ลูกชิ้น')) return '🍢';
            if (name.includes('ข้าวโพด')) return '🌽';
            if (name.includes('เห็ด')) return '🍄';
            if (name.includes('น้ำแข็ง')) return '🧊';
            if (name.includes('น้ำเปล่า')) return '💧';
            return null;
        }
        
        function getEmojiForCategory(catName) {
            if (!catName) return '🍽️';
            switch (catName) {
                case 'เนื้อสัตว์': return '🥩';
                case 'อาหารทะเล': return '🐟';
                case 'ของทานเล่น': return '🧆';
                case 'ผัก': return '🥬';
                case 'เส้น': return '🍜';
                case 'เครื่องดื่ม': return '🥤';
                case 'เซ็ต': return '🥘';
                default: return '🍽️';
            }
        }

        function renderCategories(categories, activeId) {
            const container = document.getElementById('categoriesContainer');
            let html = `
                <button onclick="changeCategory(null)" 
                   class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-medium transition-all duration-200 ${(!activeId) ? 'bg-slate-800 text-white shadow-md transform scale-105' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}">
                    ทั้งหมด
                </button>
            `;
            if (categories) {
                categories.forEach(cat => {
                    const isActive = (activeId == cat.categoriesId);
                    html += `
                    <button onclick="changeCategory(${cat.categoriesId})" 
                       class="px-5 py-2 rounded-full whitespace-nowrap text-sm font-medium transition-all duration-200 ${isActive ? 'bg-slate-800 text-white shadow-md transform scale-105' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}">
                        ${cat.categoriesName}
                    </button>
                    `;
                });
            }
            container.innerHTML = html;
        }

        function renderMenu(products) {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            if(products.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-500">ไม่มีรายการสินค้า</div>`;
                return;
            }

            products.forEach(p => {
                const catName = p.categories ? p.categories.categoriesName : '-';
                let emoji = getEmojiForProduct(p.productName) || getEmojiForCategory(catName);
                const priceFormatted = Number(p.productPrice).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                const qty = cartState[p.productId] || 0;
                
                let html = `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow relative">
                    <div class="flex gap-4">
                        <div class="text-4xl bg-slate-50 p-2 rounded-xl w-14 h-14 flex items-center justify-center border border-slate-100 shadow-inner shrink-0">
                            ${emoji}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-slate-800 text-md truncate">${p.productName}</h3>
                            <p class="text-orange-600 font-bold text-sm mt-1">฿<span>${priceFormatted}</span></p>
                        </div>
                    </div>
                    <div class="mt-4 bg-slate-50 rounded-xl p-1 flex justify-between items-center border border-slate-100 qty-controls ${qty > 0 ? 'border-blue-300 bg-blue-50/50' : ''}">
                        <button type="button" onclick="updateQty(${p.productId}, -1)" class="w-10 h-10 rounded-lg bg-white text-rose-500 hover:bg-rose-50 border border-slate-200 shadow-sm flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-minus text-sm"></i>
                        </button>
                        <input type="number" id="qty_${p.productId}" value="${qty}" min="0" readonly class="w-16 text-center bg-transparent font-bold text-lg text-slate-800 focus:outline-none">
                        <button type="button" onclick="updateQty(${p.productId}, 1)" class="w-10 h-10 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-plus text-sm"></i>
                        </button>
                    </div>
                </div>
                `;
                container.innerHTML += html;
            });
        }

        function updateQty(productId, amount) {
            const input = document.getElementById(`qty_${productId}`);
            let newQty = parseInt(input.value) + amount;
            if (newQty < 0) newQty = 0;
            input.value = newQty;
            cartState[productId] = newQty;

            const controls = input.parentElement;
            if (newQty > 0) {
                controls.classList.add('border-blue-300', 'bg-blue-50/50');
            } else {
                controls.classList.remove('border-blue-300', 'bg-blue-50/50');
            }
        }

        function renderPastOrders(aggregatedOrders) {
            const container = document.getElementById('pastOrdersContainer');
            
            if (!aggregatedOrders || aggregatedOrders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                        <i class="fa-solid fa-utensils text-slate-300 text-2xl mb-2"></i>
                        <p class="text-slate-400 text-sm">ยังไม่มีรายการสั่งอาหาร</p>
                    </div>`;
                return;
            }

            let html = `<div class="bg-slate-50 rounded-xl border border-slate-100 p-3 max-h-60 overflow-y-auto scrollbar-hide">`;
            aggregatedOrders.forEach(summary => {
                html += `
                    <div class="flex justify-between items-center py-2 border-b border-slate-200/60 last:border-0">
                        <span class="text-sm font-medium text-slate-700 truncate pr-2">${summary.product.productName}</span>
                        <span class="font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-md text-xs">x${summary.quantity}</span>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        async function changeCategory(catId) {
            currentCategoryId = catId;
            await fetchOrderData();
        }

        function showAlert(msg, type='success') {
            const container = document.getElementById('alertContainer');
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
            const colorClass = type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700';
            const btnClass = type === 'success' ? 'text-emerald-500 hover:text-emerald-700' : 'text-rose-500 hover:text-rose-700';
            
            container.innerHTML = `
            <div class="${colorClass} border px-4 py-3 rounded-xl mb-6 flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-2"><i class="fa-solid ${icon}"></i> <span>${msg}</span></div>
                <button onclick="this.parentElement.remove()" class="${btnClass}"><i class="fa-solid fa-xmark"></i></button>
            </div>`;
        }

        // Submit Logic
        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const quantities = {};
            let hasItems = false;

            for (const [pId, qty] of Object.entries(cartState)) {
                if (qty > 0) {
                    quantities[pId] = qty;
                    hasItems = true;
                }
            }

            if (!hasItems) {
                showAlert('กรุณาเลือกรายการอาหารอย่างน้อย 1 อย่าง', 'error');
                return;
            }

            const btn = document.getElementById('submitOrderBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังส่งรายการ...`;

            try {
                const response = await fetch(`${API_BASE}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tableId: parseInt(tableId),
                        quantities: quantities
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    showAlert(result.message, 'success');
                    cartState = {};
                    await fetchOrderData();
                } else {
                    showAlert(result.message || 'เกิดข้อผิดพลาดในการสั่งอาหาร', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-bell-concierge"></i> ยืนยันสั่งอาหาร`;
            }
        });

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
