<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>รายละเอียดออเดอร์ - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background-color: #f4f7f6;
	font-family: 'Kanit', sans-serif;
	padding: 30px;
}

.card {
	border: none;
	border-radius: 15px;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.info-label {
    color: #6c757d;
    font-size: 0.9rem;
    margin-bottom: 2px;
}

.info-value {
    font-weight: bold;
    font-size: 1.1rem;
    color: #333;
}
</style>
</head>
<body>

	<div class="container" style="max-width: 800px;">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold"><i class="bi bi-receipt"></i> รายละเอียดออเดอร์</h2>
			<a th:href="@{/orders/history}" class="btn btn-secondary">🔙 ย้อนกลับ</a>
		</div>

		<div class="card p-4 mb-4">
			<div class="row g-3">
				<div class="col-md-6 col-lg-3">
					<div class="info-label">รหัสออเดอร์</div>
					<div class="info-value" th:text="'#' + ${order.orderId}">#123</div>
				</div>
				<div class="col-md-6 col-lg-3">
					<div class="info-label">หมายเลขโต๊ะ</div>
					<div class="info-value">
                        <span class="badge bg-dark" th:text="'โต๊ะ ' + ${order.tables.tableId}">โต๊ะ 1</span>
                    </div>
				</div>
				<div class="col-md-6 col-lg-3">
					<div class="info-label">วันที่/เวลา</div>
					<div class="info-value" th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</div>
				</div>
                <div class="col-md-6 col-lg-3">
					<div class="info-label">สถานะ</div>
					<div class="info-value">
                        <span class="badge bg-success" th:text="${order.orderStatus}">paid</span>
                    </div>
				</div>
			</div>
		</div>

		<div class="card p-4">
			<h5 class="fw-bold mb-4">รายการอาหารทั้งหมด</h5>
			<div class="table-responsive">
				<table class="table table-hover">
					<thead class="table-light">
						<tr>
							<th>ชื่อเมนู</th>
							<th class="text-center">จำนวน</th>
							<th class="text-end">ราคาต่อหน่วย</th>
							<th class="text-end">รวม</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="detail : ${order.orderDetails}">
							<td th:text="${detail.product.productName}">หมูสไลด์</td>
							<td class="text-center" th:text="${detail.quantity}">2</td>
							<td class="text-end" th:text="${#numbers.formatDecimal(detail.unitPrice, 1, 2)} + ' ฿'">100.00 ฿</td>
							<td class="text-end fw-bold" th:text="${#numbers.formatDecimal(detail.unitPrice * detail.quantity, 1, 2)} + ' ฿'">200.00 ฿</td>
						</tr>
					</tbody>
					<tfoot class="border-top-0">
						<tr>
							<td colspan="3" class="text-end fw-bold fs-5 pt-4">ยอดสุทธิรวมทั้งสิ้น:</td>
							<td class="text-end fw-bold fs-4 text-success pt-4" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' ฿'">200.00 ฿</td>
						</tr>
					</tfoot>
				</table>
			</div>
		</div>
        
        <div class="text-center mt-5">
            <button class="btn btn-primary px-4" onclick="window.print()">
                <i class="bi bi-printer"></i> พิมพ์ใบเสร็จ
            </button>
        </div>
	</div>

</body>
</html>
