<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f4f7f6; font-family: Tahoma, sans-serif; padding: 30px; }
.card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
.info-label { color: #6c757d; font-size: 0.9rem; margin-bottom: 2px; }
.info-value { font-weight: bold; font-size: 1.1rem; color: #333; }
</style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Order Detail</h2>
            <a href="/orders/history" class="btn btn-secondary">Back</a>
        </div>
        <div class="card p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-6 col-lg-3"><div class="info-label">Order ID</div><div class="info-value" id="orderId">#...</div></div>
                <div class="col-md-6 col-lg-3"><div class="info-label">Table</div><div class="info-value"><span class="badge bg-dark" id="tableId">Table ...</span></div></div>
                <div class="col-md-6 col-lg-3"><div class="info-label">Date/Time</div><div class="info-value" id="orderDate">...</div></div>
                <div class="col-md-6 col-lg-3"><div class="info-label">Status</div><div class="info-value"><span class="badge bg-success" id="orderStatus">...</span></div></div>
            </div>
        </div>
        <div class="card p-4">
            <h5 class="fw-bold mb-4">Items</h5>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light"><tr><th>Menu</th><th class="text-center">Qty</th><th class="text-end">Unit Price</th><th class="text-end">Total</th></tr></thead>
                    <tbody id="detailRows"><tr><td colspan="4" class="text-center text-muted">Loading order detail...</td></tr></tbody>
                    <tfoot><tr><td colspan="3" class="text-end fw-bold fs-5 pt-4">Grand Total:</td><td class="text-end fw-bold fs-4 text-success pt-4" id="totalAmount">0.00 THB</td></tr></tfoot>
                </table>
            </div>
        </div>
        <div class="text-center mt-5">
            <button class="btn btn-primary px-4" onclick="window.print()">Print</button>
        </div>
    </div>
    <script>
        const orderId = location.pathname.split('/').filter(Boolean).pop();
        const orderIdLabel = document.getElementById('orderId');
        const tableId = document.getElementById('tableId');
        const orderDate = document.getElementById('orderDate');
        const orderStatus = document.getElementById('orderStatus');
        const detailRows = document.getElementById('detailRows');
        const totalAmount = document.getElementById('totalAmount');
        const escapeHtml = (value) => String(value ?? '')
            .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

        async function loadOrderDetail() {
            const response = await fetch(`/api/orders/history/${orderId}`);
            const data = await response.json();
            orderIdLabel.textContent = `#${data.orderId}`;
            tableId.textContent = `Table ${data.tableId}`;
            orderDate.textContent = data.orderDate;
            orderStatus.textContent = data.orderStatus;
            totalAmount.textContent = `${data.totalAmount} THB`;

            detailRows.innerHTML = (data.items || []).map((item) => `
                <tr>
                    <td>${escapeHtml(item.productName)}</td>
                    <td class="text-center">${escapeHtml(item.quantity)}</td>
                    <td class="text-end">${escapeHtml(item.unitPrice)} THB</td>
                    <td class="text-end fw-bold">${escapeHtml(item.lineTotal)} THB</td>
                </tr>
            `).join('');
        }

        loadOrderDetail();
    </script>
</body>
</html>
