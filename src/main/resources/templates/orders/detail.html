<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายละเอียดออเดอร์ - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background-color: #f4f7f6;
	font-family: 'Kanit', sans-serif;
	padding: 30px;
}

.card {
	border: none;
	border-radius: 15px;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.info-label {
    color: #6c757d;
    font-size: 0.9rem;
    margin-bottom: 2px;
}

.info-value {
    font-weight: bold;
    font-size: 1.1rem;
    color: #333;
}

#loading-spinner {
    text-align: center;
    padding: 50px;
}
</style>
</head>
<body>

	<div class="container" style="max-width: 800px;">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold"><i class="bi bi-receipt"></i> รายละเอียดออเดอร์</h2>
			<a href="/orders/history" class="btn btn-secondary">🔙 ย้อนกลับ</a>
		</div>

        <div id="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">กำลังดึงข้อมูลออเดอร์...</p>
        </div>

        <div id="order-content" style="display: none;">
            <div class="card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-6 col-lg-3">
                        <div class="info-label">รหัสออเดอร์</div>
                        <div class="info-value" id="orderIdText">#0</div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="info-label">หมายเลขโต๊ะ</div>
                        <div class="info-value">
                            <span class="badge bg-dark" id="tableIdText">โต๊ะ -</span>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="info-label">วันที่/เวลา</div>
                        <div class="info-value" id="orderDateText">-</div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="info-label">สถานะ</div>
                        <div class="info-value">
                            <span class="badge bg-success" id="orderStatusText">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <h5 class="fw-bold mb-4">รายการอาหารทั้งหมด</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ชื่อเมนู</th>
                                <th class="text-center">จำนวน</th>
                                <th class="text-end">ราคาต่อหน่วย</th>
                                <th class="text-end">รวม</th>
                            </tr>
                        </thead>
                        <tbody id="orderItemsTable">
                            <!-- Data populated via JS -->
                        </tbody>
                        <tfoot class="border-top-0">
                            <tr class="border-top">
                                <td colspan="3" class="text-end pt-3">ยอดรวม:</td>
                                <td class="text-end pt-3" id="originalTotalText">0.00 ฿</td>
                            </tr>
                            <tr id="discountRow" style="display: none;">
                                <td colspan="3" class="text-end text-danger pt-1">
                                    <span id="couponBadge" class="badge bg-info text-dark me-1" style="display: none;"></span> ส่วนลด:
                                </td>
                                <td class="text-end text-danger pt-1" id="discountAmountText">-0.00 ฿</td>
                            </tr>
                            <tr>
                                <td colspan="3" class="text-end fw-bold fs-5 pt-1">ยอดจ่ายจริง:</td>
                                <td class="text-end fw-bold fs-4 text-success pt-1" id="totalAmountText">0.00 ฿</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
	</div>

    <script>
        const API_BASE = '/api/orders';
        
        // ดึง ID จาก URL เช่น /orders/history/123
        const pathParts = window.location.pathname.split('/');
        const idFromUrl = pathParts[pathParts.length - 1];

        // ฟังก์ชันจัดรูปแบบตัวเลขเงิน
        function formatMoney(amount) {
            return parseFloat(amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ฟังก์ชันจัดรูปแบบวันที่
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('th-TH', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        async function fetchOrderDetail() {
            if (!idFromUrl || isNaN(idFromUrl)) {
                alert('ไม่พบรหัสออเดอร์');
                window.location.href = '/orders/history';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/history/${idFromUrl}`);
                if (!response.ok) throw new Error('Order not found');
                
                const data = await response.json();
                renderOrderDetail(data.order);
                
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('order-content').style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการโหลดข้อมูลออเดอร์');
                window.location.href = '/orders/history';
            }
        }

        function renderOrderDetail(order) {
            // เติมข้อมูล Header
            document.getElementById('orderIdText').innerText = `#${order.orderId}`;
            document.getElementById('tableIdText').innerText = `โต๊ะ ${order.tables ? order.tables.tableId : '-'}`;
            document.getElementById('orderDateText').innerText = formatDate(order.orderDate);
            document.getElementById('orderStatusText').innerText = order.orderStatus;

            // คำนวณและแสดงผลเงิน
            const originalAmount = order.originalAmount || order.totalAmount || 0;
            const discountAmount = order.discountAmount || 0;
            const finalAmount = order.totalAmount || 0;

            document.getElementById('originalTotalText').innerText = `${formatMoney(originalAmount)} ฿`;
            document.getElementById('totalAmountText').innerText = `${formatMoney(finalAmount)} ฿`;

            // จัดการบัตรของแถม/คูปอง
            if (discountAmount > 0 || order.couponCode) {
                document.getElementById('discountRow').style.display = 'table-row';
                document.getElementById('discountAmountText').innerText = `-${formatMoney(discountAmount)} ฿`;
                
                if (order.couponCode) {
                    const badge = document.getElementById('couponBadge');
                    badge.innerText = `🎟️ ${order.couponCode}`;
                    badge.style.display = 'inline-block';
                }
            }

            // เติมรายการอาหาร
            const tbody = document.getElementById('orderItemsTable');
            tbody.innerHTML = '';

            order.orderDetails.forEach(detail => {
                const row = document.createElement('tr');
                const totalItemPrice = detail.unitPrice * detail.quantity;
                
                row.innerHTML = `
                    <td>${detail.product ? detail.product.productName : 'ไม่ระบุ'}</td>
                    <td class="text-center">${detail.quantity}</td>
                    <td class="text-end">${formatMoney(detail.unitPrice)} ฿</td>
                    <td class="text-end fw-bold">${formatMoney(totalItemPrice)} ฿</td>
                `;
                tbody.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchOrderDetail);
    </script>
</body>
</html>
