<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f4f7f6; font-family: Tahoma, sans-serif; padding: 30px; }
.stat-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); height: 100%; }
</style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold">Sales Summary</h2>
        <a href="/" class="btn btn-secondary">Home</a>
    </div>
    <div class="row g-4 mb-5">
        <div class="col-md-6"><div class="card stat-card p-4"><h6 class="text-muted mb-1">Total Revenue</h6><h2 class="fw-bold mb-0 text-success" id="totalRevenue">0.00 THB</h2></div></div>
        <div class="col-md-6"><div class="card stat-card p-4"><h6 class="text-muted mb-1">Paid Orders</h6><h2 class="fw-bold mb-0 text-primary" id="totalOrders">0</h2></div></div>
    </div>
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card stat-card p-4">
                <h4 class="fw-bold mb-4">Top 5 Best Sellers</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>Menu</th><th class="text-center">Qty</th><th class="text-center">History</th></tr></thead><tbody id="topProducts"></tbody></table>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card stat-card p-4">
                <h4 class="fw-bold mb-4">Top 5 Least Sellers</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle"><thead><tr><th>Menu</th><th class="text-center">Qty</th><th class="text-center">History</th></tr></thead><tbody id="leastProducts"></tbody></table>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const totalRevenue = document.getElementById('totalRevenue');
    const totalOrders = document.getElementById('totalOrders');
    const topProducts = document.getElementById('topProducts');
    const leastProducts = document.getElementById('leastProducts');
    const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

    function renderProductRows(items, targetId) {
        if (!items.length) {
            targetId.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">No sales data.</td></tr>';
            return;
        }
        targetId.innerHTML = items.map((item) => `
            <tr>
                <td class="fw-bold">${escapeHtml(item.productName)}</td>
                <td class="text-center"><span class="badge bg-secondary fs-6">${escapeHtml(item.quantity)}</span></td>
                <td class="text-center"><a href="/summary/product/${encodeURIComponent(item.productId)}" class="btn btn-sm btn-outline-primary">View</a></td>
            </tr>
        `).join('');
    }

    async function loadSummary() {
        const response = await fetch('/api/summary');
        const data = await response.json();
        totalRevenue.textContent = `${data.totalRevenue} THB`;
        totalOrders.textContent = data.totalOrders;
        renderProductRows(data.topProducts || [], topProducts);
        renderProductRows(data.leastProducts || [], leastProducts);
    }

    loadSummary();
</script>
</body>
</html>
