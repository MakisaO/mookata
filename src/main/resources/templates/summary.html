<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>สรุปยอดขาย - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background-color: #f4f7f6;
	font-family: 'Kanit', sans-serif;
	padding: 30px;
}

/* Loading Overlay Styles */
#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease-out;
}

.spinner-grow {
    width: 3rem;
    height: 3rem;
}

.stat-card {
	border: none;
	border-radius: 15px;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
	transition: transform 0.3s ease;
	height: 100%;
}

.stat-card:hover {
	transform: translateY(-5px);
}

.icon-box {
	width: 60px;
	height: 60px;
	border-radius: 12px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 28px;
	margin-bottom: 20px;
}

.bg-revenue { background-color: #e8f5e9; color: #2e7d32; }
.bg-orders { background-color: #e3f2fd; color: #1565c0; }
.bg-top { background-color: #fff3e0; color: #ef6c00; }
.bg-least { background-color: #fce4ec; color: #c2185b; }

.table-stats {
    margin-top: 10px;
}
</style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner-grow text-primary mb-3" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="fw-bold text-primary">กำลังคำนวณยอดขาย...</h5>
        <p class="text-muted small">กรุณารอสักครู่</p>
    </div>

	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-5">
			<h2 class="fw-bold"><i class="bi bi-bar-chart-line"></i> สรุปยอดขาย (Sales Summary)</h2>
			<a href="/" class="btn btn-secondary">🏠 กลับหน้าหลัก</a>
		</div>

		<div class="row g-4 mb-5">
			<!-- Total Revenue -->
			<div class="col-md-6">
				<div class="card stat-card p-4">
					<div class="icon-box bg-revenue">
						<i class="bi bi-currency-dollar"></i>
					</div>
					<h6 class="text-muted mb-1">รายได้รวมทั้งหมด</h6>
					<h2 class="fw-bold mb-0 text-success" id="totalRevenue">0.00 ฿</h2>
				</div>
			</div>

			<!-- Total Orders -->
			<div class="col-md-6">
				<div class="card stat-card p-4">
					<div class="icon-box bg-orders">
						<i class="bi bi-receipt"></i>
					</div>
					<h6 class="text-muted mb-1">จำนวนออเดอร์ที่ชำระแล้ว</h6>
					<h2 class="fw-bold mb-0 text-primary" id="totalOrders">0</h2>
				</div>
			</div>
		</div>

		<div class="row g-4">
			<!-- Top 5 Best Sellers -->
			<div class="col-lg-6">
				<div class="card stat-card p-4">
					<div class="d-flex align-items-center mb-4">
						<div class="icon-box bg-top mb-0 me-3">
							<i class="bi bi-star-fill"></i>
						</div>
						<h4 class="fw-bold mb-0">5 อันดับเมนูขายดี</h4>
					</div>
					
					<div class="table-responsive">
						<table class="table table-hover align-middle table-stats">
							<thead>
								<tr>
									<th>ชื่อเมนู</th>
									<th class="text-center">จำนวนที่ขาย</th>
									<th class="text-center">ประวัติ</th>
								</tr>
							</thead>
							<tbody id="topProductsTable">
								<!-- Data will be loaded here -->
							</tbody>
						</table>
					</div>
				</div>
			</div>

            <!-- Least 5 Sellers -->
			<div class="col-lg-6">
				<div class="card stat-card p-4">
					<div class="d-flex align-items-center mb-4">
						<div class="icon-box bg-least mb-0 me-3">
							<i class="bi bi-graph-down-arrow"></i>
						</div>
						<h4 class="fw-bold mb-0">5 อันดับเมนูขายน้อย</h4>
					</div>
					
					<div class="table-responsive">
						<table class="table table-hover align-middle table-stats">
							<thead>
								<tr>
									<th>ชื่อเมนู</th>
									<th class="text-center">จำนวนที่ขาย</th>
									<th class="text-center">ประวัติ</th>
								</tr>
							</thead>
							<tbody id="leastProductsTable">
								<!-- Data will be loaded here -->
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchSummaryData();
        });

        async function fetchSummaryData() {
            const loader = document.getElementById('loadingOverlay');
            try {
                const response = await fetch('/api/summary');
                const data = await response.json();
                
                document.getElementById('totalRevenue').innerText = 
                    (data.totalRevenue || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' ฿';
                document.getElementById('totalOrders').innerText = data.totalOrders || 0;

                renderProductsTable('topProductsTable', data.topProducts, 'bg-warning text-dark');
                renderProductsTable('leastProductsTable', data.leastProducts, 'bg-danger');

            } catch (error) {
                console.error('Error fetching summary data:', error);
                const loaderText = loader.querySelector('h5');
                loaderText.innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                loaderText.classList.replace('text-primary', 'text-danger');
            } finally {
                // Hide loader with a slight delay for smooth transition
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 300);
            }
        }

        function renderProductsTable(tableId, entries, badgeClass) {
            const tableBody = document.getElementById(tableId);
            tableBody.innerHTML = '';

            if (!entries || entries.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">ยังไม่มีข้อมูลยอดขาย</td></tr>';
                return;
            }

            entries.forEach(entry => {
                const product = entry.product;
                const quantity = entry.quantity;
                
                const row = `
                    <tr>
                        <td class="fw-bold">${product.productName}</td>
                        <td class="text-center">
                            <span class="badge ${badgeClass} fs-6">${quantity}</span>
                        </td>
                        <td class="text-center">
                            <a href="/summary/product/${product.productId}" class="btn btn-sm btn-outline-primary">
                                📊 ดูประวัติ
                            </a>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        }
    </script>
</body>
</html>
