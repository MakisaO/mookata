<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ฟอร์มจัดการโต๊ะ</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f8;
        }

        .page {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            text-align: center;
        }

        .card {
            width: min(420px, 100%);
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            background: #28a745;
            color: #fff;
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-cancel {
            background: #dc3545;
        }

        .btn-back {
            background: #6c757d;
        }

        .alert {
            width: min(420px, 100%);
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            box-sizing: border-box;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1 id="pageTitle">ฟอร์มจัดการโต๊ะ</h1>
        <div id="messageBox" class="alert" style="display: none;"></div>

        <div class="card">
            <form id="tableForm">
                <div class="form-group" id="tableIdGroup" style="display: none;">
                    <label for="tableId">รหัสโต๊ะ</label>
                    <input type="text" id="tableId" readonly style="background: #eee;">
                </div>

                <div class="form-group">
                    <label for="status">สถานะ</label>
                    <select id="status" required>
                        <option value="">เลือกสถานะ</option>
                        <option value="available">ว่าง</option>
                        <option value="unavailable">กำลังใช้งาน</option>
                        <option value="reserved">จองแล้ว</option>
                        <option value="maintenance">ซ่อมบำรุง (ปิดใช้งาน)</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="submit" class="btn" id="submitButton">บันทึก</button>
                    <a href="/tables" class="btn btn-cancel">ยกเลิก</a>
                    <a href="/" class="btn btn-back">ย้อนกลับ</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const TABLES_API = '/api/tables';
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const isEditMode = pathParts.includes('edit');
        const tableId = isEditMode ? pathParts[pathParts.length - 1] : null;

        const pageTitle = document.getElementById('pageTitle');
        const tableIdGroup = document.getElementById('tableIdGroup');
        const tableIdInput = document.getElementById('tableId');
        const statusInput = document.getElementById('status');
        const messageBox = document.getElementById('messageBox');
        const tableForm = document.getElementById('tableForm');
        const submitButton = document.getElementById('submitButton');

        function showMessage(type, message) {
            messageBox.className = `alert ${type === 'success' ? 'alert-success' : 'alert-danger'}`;
            messageBox.textContent = message;
            messageBox.style.display = 'block';
        }

        async function loadTable() {
            if (!isEditMode) {
                pageTitle.textContent = 'เพิ่มโต๊ะใหม่';
                return;
            }

            pageTitle.textContent = 'แก้ไขสถานะโต๊ะ';
            tableIdGroup.style.display = 'block';

            try {
                const response = await fetch(`${TABLES_API}/${tableId}`);
                if (!response.ok) {
                    let errorMessage = 'ไม่สามารถโหลดข้อมูลโต๊ะได้';
                    try {
                        const errorBody = await response.json();
                        errorMessage = errorBody.message || errorMessage;
                    } catch (parseError) {
                    }
                    throw new Error(errorMessage);
                }

                const table = await response.json();
                tableIdInput.value = table.tableId;
                statusInput.value = table.status || '';
            } catch (error) {
                showMessage('error', error.message);
                submitButton.disabled = true;
            }
        }

        tableForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageBox.style.display = 'none';

            const payload = {
                status: statusInput.value
            };

            if (!payload.status) {
                showMessage('error', 'กรุณาเลือกสถานะ');
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'กำลังบันทึก...';

            try {
                const response = await fetch(isEditMode ? `${TABLES_API}/${tableId}` : TABLES_API, {
                    method: isEditMode ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let errorMessage = 'บันทึกข้อมูลไม่สำเร็จ';
                    try {
                        const errorBody = await response.json();
                        errorMessage = errorBody.message || errorMessage;
                    } catch (parseError) {
                    }
                    throw new Error(errorMessage);
                }

                window.location.href = '/tables';
            } catch (error) {
                showMessage('error', error.message);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'บันทึก';
            }
        });

        document.addEventListener('DOMContentLoaded', loadTable);
    </script>
</body>
</html>
