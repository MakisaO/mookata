<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ฟอร์มจัดการโต๊ะ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 8px; width: 200px; box-sizing: border-box; }
        
      
        .btn, .btn-cancel {
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            height: 40px; 
            padding: 0 15px;
            font-family: inherit;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn {
            background: #28a745;
            color: white;
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
            margin-left: 10px;
        }
        

        .card { 
            border: 1px solid #ddd; 
            padding: 20px; 
            width: 400px; 
            border-radius: 8px; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <h1 th:text="${table.tableId == null ? 'เพิ่มโต๊ะใหม่' : 'แก้ไขสถานะโต๊ะ'}">ฟอร์ม</h1>
    
    <div class="card">
        <form th:action="${table.tableId == null ? '/tables/save' : '/tables/update/' + table.tableId}" 
              th:object="${table}" method="post">
            
            <div class="form-group" th:if="${table.tableId != null}">
                <label>หมายเลขโต๊ะ:</label>
                <input type="text" th:field="*{tableId}" readonly style="background: #eee;">
            </div>
            
            <div class="form-group">
                <label>สถานะ (Status):</label>
                <select th:field="*{status}" required>
                    <option value="">-- เลือกสถานะ --</option>
                    <option value="available">ว่าง (Available)</option>
                    <option value="occupied">กำลังใช้งาน (Occupied)</option>
                    <option value="reserved">จองแล้ว (Reserved)</option>
                </select>
            </div>
            
            <button type="submit" class="btn">💾 บันทึก</button>
            <a th:href="@{/tables}" class="btn-cancel">❌ ยกเลิก</a>
        </form>
    </div>

</body>
</html>
