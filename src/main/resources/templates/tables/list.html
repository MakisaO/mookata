<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables - Mookata</title>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .alert { padding: 12px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn-add { display: inline-block; padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 6px; margin-bottom: 25px; font-weight: bold; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .table-card { border: 2px solid #eee; padding: 20px; border-radius: 12px; text-align: center; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .table-card.available { border-color: #4CAF50; background-color: #f9fff9; }
        .table-card.unavailable, .table-card.occupied { border-color: #f44336; background-color: #fffafa; }
        .table-card.maintenance { border-color: #6c757d; background-color: #f8f9fa; opacity: 0.8; }
        .table-card.reserved { border-color: #ffc107; background-color: #fffdf5; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; margin: 10px 0; font-weight: bold; background: #eef1f3; }
        .button-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { display: block; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 14px; color: white; border: none; font-weight: 500; cursor: pointer; text-align: center; }
        .btn-order { background-color: #2196F3; }
        .btn-edit { background-color: #ff9800; }
        .btn-success { background-color: #4CAF50; }
        .btn-reset { background-color: #6c757d; }
        .btn-delete { background-color: #dc3545; font-size: 12px; padding: 5px; margin-top: 5px; }
        .footer { text-align: center; margin-top: 40px; }
        .footer a { color: #666; text-decoration: none; font-size: 14px; }
        .loading, .empty { text-align: center; color: #666; padding: 24px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Table Management</h2>

        <div id="successMessage" class="alert alert-success"></div>
        <div id="errorMessage" class="alert alert-danger"></div>

        <div style="text-align: right;">
            <a href="/tables/new" class="btn-add">+ Add Table</a>
        </div>

        <div id="tableGrid" class="table-grid">
            <div class="loading">Loading tables...</div>
        </div>

        <div class="footer">
            <a href="/">Back Home</a>
        </div>
    </div>

    <script>
        const tableGrid = document.getElementById('tableGrid');
        const successBox = document.getElementById('successMessage');
        const errorBox = document.getElementById('errorMessage');

        function showMessage(type, text) {
            const target = type === 'success' ? successBox : errorBox;
            const other = type === 'success' ? errorBox : successBox;
            other.style.display = 'none';
            other.textContent = '';
            target.textContent = text;
            target.style.display = 'block';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeStatus(status) {
            if (status === 'occupied') {
                return 'unavailable';
            }
            return status || 'unknown';
        }

        function statusLabel(status) {
            switch (normalizeStatus(status)) {
                case 'available': return 'Available';
                case 'unavailable': return 'Occupied';
                case 'reserved': return 'Reserved';
                case 'maintenance': return 'Maintenance';
                default: return status || 'Unknown';
            }
        }

        async function resetTable(tableId) {
            if (!confirm('Reset this table to available?')) {
                return;
            }

            try {
                const response = await fetch(`/api/tables/${tableId}/reset`, { method: 'POST' });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.message || 'Unable to reset table');
                }
                showMessage('success', payload.message);
                await loadTables();
            } catch (error) {
                showMessage('error', error.message);
            }
        }

        async function loadTables() {
            tableGrid.innerHTML = '<div class="loading">Loading tables...</div>';

            try {
                const response = await fetch('/api/tables');
                if (!response.ok) {
                    throw new Error('Unable to load tables');
                }

                const tables = await response.json();
                if (!tables.length) {
                    tableGrid.innerHTML = '<div class="empty">No tables found.</div>';
                    return;
                }

                tableGrid.innerHTML = tables.map((table) => {
                    const status = normalizeStatus(table.status);
                    const checkoutVisible = status === 'unavailable' || status === 'reserved';
                    const deleteVisible = status !== 'unavailable' && status !== 'occupied';

                    return `
                        <div class="table-card ${escapeHtml(status)}">
                            <h3 style="margin: 0; color: #333;">Table ${escapeHtml(table.tableId)}</h3>
                            <span class="status-badge">${escapeHtml(statusLabel(table.status))}</span>
                            <div class="button-group">
                                <a href="/orders/${encodeURIComponent(table.tableId)}" class="btn btn-order">Order</a>
                                <a href="/tables/edit/${encodeURIComponent(table.tableId)}" class="btn btn-edit">Edit Status</a>
                                ${checkoutVisible ? `<a href="/payments/checkout/table/${encodeURIComponent(table.tableId)}" class="btn btn-success">Checkout</a>` : ''}
                                ${checkoutVisible ? `<button type="button" class="btn btn-reset" onclick="resetTable(${Number(table.tableId)})">Reset Table</button>` : ''}
                                ${deleteVisible ? `<a href="/tables/delete/${encodeURIComponent(table.tableId)}" class="btn btn-delete" onclick="return confirm('Delete this table?')">Delete</a>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                tableGrid.innerHTML = '<div class="empty">Failed to load tables.</div>';
                showMessage('error', error.message);
            }
        }

        loadTables();
    </script>
</body>
</html>
