<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>จัดการโต๊ะ</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f8;
        }

        .page {
            width: min(900px, 100%);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .btn-edit {
            background: #ffc107;
            color: #000;
            margin-bottom: 0;
        }

        .btn-back {
            background: #6c757d;
            margin-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>ระบบจัดการโต๊ะ</h1>

        <div>
            <a th:href="@{/tables/new}" class="btn">เพิ่มโต๊ะใหม่</a>
            <a th:href="@{/}" class="btn btn-back">ย้อนกลับ</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>รหัสโต๊ะ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="table : ${tables}">
                    <td th:text="${table.tableId}">1</td>
                    <td th:text="${table.status}">available</td>
                    <td>
                        <a th:href="@{/tables/edit/{id}(id=${table.tableId})}" class="btn btn-edit">แก้ไขสถานะ</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
