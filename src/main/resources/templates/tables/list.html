<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>จัดการโต๊ะ - Mookata</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .table-card { border: 2px solid #ddd; padding: 20px; border-radius: 10px; text-align: center; background: #fff; position: relative; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 15px; font-size: 12px; margin-top: 10px; }
        .available { border-color: #4CAF50; color: #4CAF50; }
        .unavailable { border-color: #f44336; color: #f44336; background: #fff5f5; }
        .btn { display: inline-block; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 14px; margin-top: 10px; color: white; }
        .btn-edit { background-color: #ff9800; }
        .btn-add { background-color: #4CAF50; margin-bottom: 20px; }
        .btn-order { background-color: #2196F3; } /* สีฟ้าสำหรับปุ่มสั่งอาหาร */
    	.btn-order:hover { background-color: #1976D2; }
    
    .button-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>โต๊ะในร้าน</h2>
        
        <a th:href="@{/tables/new}" class="btn btn-add">+ เพิ่มโต๊ะใหม่</a>

        <div class="table-grid">
    <div class="table-card" th:each="t : ${tables}" 
         th:classappend="${t.status == 'available' ? 'available' : 'unavailable'}">
        
        <h3 th:text="'โต๊ะ ' + ${t.tableId}">โต๊ะ 1</h3>
        
        <span class="status-badge" 
              th:text="${t.status == 'available' ? '● ว่าง' : '● มีลูกค้า'}"></span>
        
        <div class="button-group">
            <a th:href="@{/orders/{id}(id=${t.tableId})}" class="btn btn-order">
                🛒 สั่งอาหาร
            </a>

            <a th:href="@{/tables/edit/{id}(id=${t.tableId})}" class="btn btn-edit">
                ⚙️ แก้ไขสถานะ
            </a>

            <a th:if="${t.status != 'available'}" th:href="@{/payments/checkout/table/{id}(id=${t.tableId})}" class="btn btn-success" style="background-color: #4CAF50;">
                💸 ชำระเงิน
            </a>
        </div>
    </div>
</div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a th:href="@{/}" style="color: #666;">กลับหน้าหลัก</a>
        </div>
    </div>
</body>
</html>
