<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ประวัติการขายสินค้า - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background-color: #f4f7f6;
	font-family: 'Kanit', sans-serif;
	padding: 30px;
}

.card {
	border: none;
	border-radius: 15px;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.bg-product {
    background: linear-gradient(45deg, #2196F3, #00BCD4);
    color: white;
}
</style>
</head>
<body>

	<div class="container" style="max-width: 900px;">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold"><i class="bi bi-graph-up"></i> ประวัติการขายสินค้า</h2>
			<a href="/summary" class="btn btn-secondary">🔙 ย้อนกลับ</a>
		</div>

		<div class="card bg-product p-4 mb-4">
			<div class="row align-items-center">
				<div class="col-md-7">
					<h6 class="text-white-50 mb-1">ชื่อสินค้า</h6>
					<h2 class="fw-bold mb-0" id="productName">...</h2>
					<p class="mb-0 mt-2" id="productDetail">...</p>
				</div>
				<div class="col-md-5 text-md-end mt-3 mt-md-0 border-start border-white-50">
					<div class="row">
						<div class="col-6">
							<h6 class="text-white-50 small">ขายได้ทั้งหมด</h6>
							<h3 class="fw-bold mb-0" id="totalSold">0</h3>
						</div>
						<div class="col-6">
							<h6 class="text-white-50 small">ยอดขายรวม</h6>
							<h3 class="fw-bold mb-0" id="totalRevenue">0.00 ฿</h3>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="card p-4">
			<h5 class="fw-bold mb-4">รายการการขายทั้งหมด (เฉพาะที่ชำระเงินแล้ว)</h5>
			<div class="table-responsive">
				<table class="table table-hover align-middle">
					<thead class="table-light">
						<tr>
							<th>วันที่/เวลา</th>
							<th class="text-center">โต๊ะ</th>
							<th class="text-center">จำนวน</th>
							<th class="text-end">ราคาขณะขาย</th>
							<th class="text-end">รวม</th>
							<th class="text-center">บิล</th>
						</tr>
					</thead>
					<tbody id="salesHistoryTable">
						<!-- Data will be loaded here -->
					</tbody>
				</table>
			</div>
		</div>
	</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParts = window.location.pathname.split('/');
            const productId = urlParts[urlParts.length - 1];
            if (productId) {
                fetchProductSales(productId);
            }
        });

        async function fetchProductSales(id) {
            try {
                const response = await fetch(`/api/summary/product/${id}`);
                const data = await response.json();
                
                document.getElementById('productName').innerText = data.product.productName;
                document.getElementById('productDetail').innerText = data.product.productDetail || '';
                document.getElementById('totalSold').innerText = data.totalSold;
                document.getElementById('totalRevenue').innerText = 
                    (data.totalRevenue || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + ' ฿';

                renderSalesHistory(data.salesHistory);

            } catch (error) {
                console.error('Error fetching product sales data:', error);
            }
        }

        function renderSalesHistory(history) {
            const tableBody = document.getElementById('salesHistoryTable');
            tableBody.innerHTML = '';

            if (!history || history.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">ยังไม่มีประวัติการขายสินค้านี้</td></tr>';
                return;
            }

            history.forEach(item => {
                const orderDate = new Date(item.ordermenu.orderDate);
                const formattedDate = orderDate.toLocaleString('th-TH', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const total = item.unitPrice * item.quantity;

                const row = `
                    <tr>
                        <td>${formattedDate}</td>
                        <td class="text-center">
                            <span class="badge bg-dark">โต๊ะ ${item.ordermenu.tables.tableId}</span>
                        </td>
                        <td class="text-center fw-bold">${item.quantity}</td>
                        <td class="text-end">${item.unitPrice.toLocaleString('th-TH', { minimumFractionDigits: 2 })} ฿</td>
                        <td class="text-end fw-bold text-success">${total.toLocaleString('th-TH', { minimumFractionDigits: 2 })} ฿</td>
                        <td class="text-center">
                            <a href="/orders/history/${item.ordermenu.orderId}" class="btn btn-sm btn-light">
                                #${item.ordermenu.orderId}
                            </a>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        }
    </script>
</body>
</html>
