<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Sales - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f4f7f6; font-family: Tahoma, sans-serif; padding: 30px; }
.card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
.bg-product { background: linear-gradient(45deg, #2196F3, #00BCD4); color: white; }
</style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Product Sales History</h2>
        <a href="/summary" class="btn btn-secondary">Back</a>
    </div>
    <div class="card bg-product p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-7">
                <h6 class="text-white-50 mb-1">Product Name</h6>
                <h2 class="fw-bold mb-0" id="productName">...</h2>
                <p class="mb-0 mt-2" id="productDetail"></p>
            </div>
            <div class="col-md-5 text-md-end mt-3 mt-md-0 border-start border-white-50">
                <div class="row">
                    <div class="col-6"><h6 class="text-white-50 small">Total Sold</h6><h3 class="fw-bold mb-0" id="totalSold">0</h3></div>
                    <div class="col-6"><h6 class="text-white-50 small">Revenue</h6><h3 class="fw-bold mb-0" id="totalRevenue">0.00</h3></div>
                </div>
            </div>
        </div>
    </div>
    <div class="card p-4">
        <h5 class="fw-bold mb-4">Sales History</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light"><tr><th>Date/Time</th><th class="text-center">Table</th><th class="text-center">Qty</th><th class="text-end">Unit Price</th><th class="text-end">Total</th><th class="text-center">Bill</th></tr></thead>
                <tbody id="salesRows"><tr><td colspan="6" class="text-center py-5 text-muted">Loading sales history...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const productId = location.pathname.split('/').filter(Boolean).pop();
    const productName = document.getElementById('productName');
    const productDetail = document.getElementById('productDetail');
    const totalSold = document.getElementById('totalSold');
    const totalRevenue = document.getElementById('totalRevenue');
    const salesRows = document.getElementById('salesRows');
    const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

    async function loadProductSales() {
        const response = await fetch(`/api/summary/product/${productId}`);
        const data = await response.json();
        productName.textContent = data.productName;
        productDetail.textContent = data.productDetail || '';
        totalSold.textContent = data.totalSold;
        totalRevenue.textContent = `${data.totalRevenue} THB`;

        if (!(data.salesHistory || []).length) {
            salesRows.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">No sales history for this product.</td></tr>';
            return;
        }

        salesRows.innerHTML = data.salesHistory.map((entry) => `
            <tr>
                <td>${escapeHtml(entry.orderDate)}</td>
                <td class="text-center"><span class="badge bg-dark">Table ${escapeHtml(entry.tableId)}</span></td>
                <td class="text-center fw-bold">${escapeHtml(entry.quantity)}</td>
                <td class="text-end">${escapeHtml(entry.unitPrice)} THB</td>
                <td class="text-end fw-bold text-success">${escapeHtml(entry.lineTotal)} THB</td>
                <td class="text-center"><a href="/orders/history/${encodeURIComponent(entry.orderId)}" class="btn btn-sm btn-light">#${escapeHtml(entry.orderId)}</a></td>
            </tr>
        `).join('');
    }

    loadProductSales();
</script>
</body>
</html>
