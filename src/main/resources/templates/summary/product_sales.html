<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ประวัติการขายสินค้า - Mookata</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body {
	background-color: #f4f7f6;
	font-family: 'Kanit', sans-serif;
	padding: 30px;
}

.card {
	border: none;
	border-radius: 15px;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.bg-product {
    background: linear-gradient(45deg, #2196F3, #00BCD4);
    color: white;
}
</style>
</head>
<body>

	<div class="container" style="max-width: 900px;">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="fw-bold"><i class="bi bi-graph-up"></i> ประวัติการขายสินค้า</h2>
			<a th:href="@{/summary}" class="btn btn-secondary">🔙 ย้อนกลับ</a>
		</div>

		<div class="card bg-product p-4 mb-4">
			<div class="row align-items-center">
				<div class="col-md-7">
					<h6 class="text-white-50 mb-1">ชื่อสินค้า</h6>
					<h2 class="fw-bold mb-0" th:text="${product.productName}">หมูสามชั้น</h2>
					<p class="mb-0 mt-2" th:text="${product.productDetail}">รายละเอียด...</p>
				</div>
				<div class="col-md-5 text-md-end mt-3 mt-md-0 border-start border-white-50">
					<div class="row">
						<div class="col-6">
							<h6 class="text-white-50 small">ขายได้ทั้งหมด</h6>
							<h3 class="fw-bold mb-0" th:text="${totalSold}">0</h3>
						</div>
						<div class="col-6">
							<h6 class="text-white-50 small">ยอดขายรวม</h6>
							<h3 class="fw-bold mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)} + ' ฿'">0.00</h3>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="card p-4">
			<h5 class="fw-bold mb-4">รายการการขายทั้งหมด (เฉพาะที่ชำระเงินแล้ว)</h5>
			<div class="table-responsive">
				<table class="table table-hover align-middle">
					<thead class="table-light">
						<tr>
							<th>วันที่/เวลา</th>
							<th class="text-center">โต๊ะ</th>
							<th class="text-center">จำนวน</th>
							<th class="text-end">ราคาขณะขาย</th>
							<th class="text-end">รวม</th>
							<th class="text-center">บิล</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="detail : ${salesHistory}">
							<td th:text="${#dates.format(detail.ordermenu.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
							<td class="text-center">
                                <span class="badge bg-dark" th:text="'โต๊ะ ' + ${detail.ordermenu.tables.tableId}">โต๊ะ 1</span>
                            </td>
							<td class="text-center fw-bold" th:text="${detail.quantity}">2</td>
							<td class="text-end" th:text="${#numbers.formatDecimal(detail.unitPrice, 1, 2)} + ' ฿'">100.00</td>
							<td class="text-end fw-bold text-success" th:text="${#numbers.formatDecimal(detail.unitPrice * detail.quantity, 1, 2)} + ' ฿'">200.00</td>
							<td class="text-center">
                                <a th:href="@{/orders/history/{id}(id=${detail.ordermenu.orderId})}" class="btn btn-sm btn-light">
                                    #[[${detail.ordermenu.orderId}]]
                                </a>
                            </td>
						</tr>
						<tr th:if="${#lists.isEmpty(salesHistory)}">
							<td colspan="6" class="text-center py-5 text-muted">ยังไม่มีประวัติการขายสินค้านี้</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

</body>
</html>
