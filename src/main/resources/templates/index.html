<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .home-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .btn-custom {
            width: 250px;
            padding: 20px;
            font-size: 1.2rem;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        .btn-custom:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-light">

    <div class="container home-container">
        <h1 class="mb-4">ยินดีต้อนรับสู่ระบบร้าน The Star MooKaTa</h1>
        
        <div class="d-grid gap-3 d-md-block">
            <a th:href="@{/tables}" class="btn btn-primary btn-custom shadow">
                <i class="bi bi-shop"></i> จัดการร้านค้า (โต๊ะ)
            </a>

            <a th:href="@{/menu}" class="btn btn-success btn-custom shadow">
                <i class="bi bi-book"></i> ดูเมนูอาหาร
            </a>
        </div>
    </div>

</body>
