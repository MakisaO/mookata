<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ห้องครัว - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f8f9fa; font-family: 'Kanit', sans-serif; }
.ticket-card { border-radius: 12px; border-left: 5px solid; transition: transform 0.2s; }
.ticket-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important; }
.status-ordered { border-left-color: #dc3545; }
.status-cooking { border-left-color: #ffc107; }
</style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🔥 ห้องครัว (รายการออเดอร์)</h2>
        <a th:href="@{/}" class="btn btn-outline-secondary">กลับหน้าหลัก</a>
    </div>
    
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    
    <div class="row g-4">
        <!-- Loop over each order round -->
        <div class="col-12" th:each="entry : ${groupedOrders}">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-3">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                    <h4 class="mb-0 fw-bold">🍽️ โต๊ะ [[${entry.key.tables.tableId}]]</h4>
                    <div class="text-end">
                        <span class="badge bg-light text-dark fs-6 rounded-pill px-3 py-2 me-2">บิล #[[${entry.key.orderId}]]</span>
                        <span class="fs-6 fw-bold"><i class="bi bi-clock"></i> สั่งเวลา: [[${#dates.format(entry.key.orderDate, 'HH:mm')}]]</span>
                    </div>
                </div>
                <div class="card-body bg-light" style="border: 1px solid #dee2e6; border-top: none;">
                    <div class="row g-3">
                        <!-- Loop over items in this round -->
                        <div class="col-md-6 col-lg-4" th:each="item : ${entry.value}">
                            <div class="card ticket-card shadow-sm h-100 bg-white" th:classappend="${item.itemStatus == 'ordered'} ? 'status-ordered' : 'status-cooking'">
                                <div class="card-body d-flex flex-column">
                                    <h4 class="card-title fw-bold text-dark my-2">
                                        [[${item.product.productName}]] 
                                        <span class="text-danger ms-2 fs-5">x[[${item.quantity}]]</span>
                                    </h4>
                                    
                                    <div class="d-flex gap-2 mt-auto pt-3 border-top pb-1 mt-3">
                                        <a th:if="${item.itemStatus == 'ordered'}" th:href="@{/kitchen/cook/{id}(id=${item.detailId})}" class="btn btn-warning w-100 fw-bold py-2 shadow-sm text-dark">👨‍🍳 เริ่มทำอาหาร</a>
                                        <a th:if="${item.itemStatus == 'cooking'}" th:href="@{/kitchen/serve/{id}(id=${item.detailId})}" class="btn btn-success w-100 fw-bold py-2 shadow-sm">🛎️ เสิร์ฟแล้ว</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#maps.isEmpty(groupedOrders)}" class="col-12 text-center py-5">
            <h3 class="text-muted mt-5">ไม่มีออเดอร์ค้าง ดื่มน้ำพักผ่อนได้ 🍵</h3>
        </div>
    </div>
</div>

<script>
    setTimeout(function(){
       window.location.reload();
    }, 15000); // Auto refresh every 15s to see new orders
</script>
</body>
</html>
