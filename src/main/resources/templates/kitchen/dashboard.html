<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f8f9fa; font-family: Tahoma, sans-serif; }
.ticket-card { border-radius: 12px; border-left: 5px solid; }
.status-ordered { border-left-color: #dc3545; }
.status-cooking { border-left-color: #ffc107; }
</style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Kitchen Dashboard</h2>
        <a href="/" class="btn btn-outline-secondary">Back Home</a>
    </div>
    <div id="messageBox" class="alert alert-success d-none"></div>
    <div id="roundsWrap" class="row g-4">
        <div class="col-12 text-center py-5 text-muted">Loading kitchen queue...</div>
    </div>
</div>
<script>
    const roundsWrap = document.getElementById('roundsWrap');
    const messageBox = document.getElementById('messageBox');
    const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

    function showMessage(text) {
        messageBox.textContent = text;
        messageBox.classList.remove('d-none');
    }

    async function kitchenAction(url) {
        const response = await fetch(url, { method: 'POST' });
        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload.message || 'Kitchen action failed');
        }
        showMessage(payload.message);
        await loadKitchen();
    }

    async function loadKitchen() {
        const response = await fetch('/api/kitchen');
        const data = await response.json();
        const rounds = data.rounds || [];

        if (!rounds.length) {
            roundsWrap.innerHTML = '<div class="col-12 text-center py-5 text-muted">No pending kitchen items.</div>';
            return;
        }

        roundsWrap.innerHTML = rounds.map((round) => `
            <div class="col-12">
                <div class="card shadow-sm border-0 rounded-4 overflow-hidden mb-3">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                        <h4 class="mb-0 fw-bold">Table ${escapeHtml(round.tableId)}</h4>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-light me-3 px-3 fw-bold" onclick="kitchenAction('/api/kitchen/orders/${round.orderId}/mass-update')">${escapeHtml(round.massActionLabel)}</button>
                            <div class="text-end">
                                <span class="badge bg-light text-dark fs-6 rounded-pill px-3 py-2 me-2">Bill #${escapeHtml(round.orderId)}</span>
                                <span class="fs-6 fw-bold">${escapeHtml(round.orderTime)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-body bg-light">
                        <div class="row g-3">
                            ${round.items.map((item) => `
                                <div class="col-md-6 col-lg-4">
                                    <div class="card ticket-card shadow-sm h-100 bg-white ${item.itemStatus === 'ordered' ? 'status-ordered' : 'status-cooking'}">
                                        <div class="card-body d-flex flex-column">
                                            <h4 class="card-title fw-bold text-dark my-2">${escapeHtml(item.productName)} <span class="text-danger ms-2 fs-5">x${escapeHtml(item.quantity)}</span></h4>
                                            <div class="mt-2 mb-3 text-${item.itemStatus === 'ordered' ? 'danger' : 'warning'} small fw-bold">${item.itemStatus === 'ordered' ? 'New order waiting to cook' : 'Cooking in progress'}</div>
                                            <div class="d-flex gap-2 mt-auto pt-3 border-top pb-1 mt-3">
                                                ${item.itemStatus === 'ordered'
                                                    ? `<button class="btn btn-warning w-100 fw-bold py-2 shadow-sm text-dark" onclick="kitchenAction('/api/kitchen/items/${item.detailId}/cook')">Start Cooking</button>`
                                                    : `<button class="btn btn-success w-100 fw-bold py-2 shadow-sm" onclick="kitchenAction('/api/kitchen/items/${item.detailId}/serve')">Mark Served</button>`}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    loadKitchen();
    setInterval(loadKitchen, 15000);
</script>
</body>
</html>
