<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotion Form - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background-color: #f4f7f6; font-family: Tahoma, sans-serif; padding: 30px; }
.container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
</style>
</head>
<body>
    <div class="container">
        <h2 class="fw-bold mb-4" id="title">Promotion Form</h2>
        <div id="errorMessage" class="alert alert-danger d-none"></div>
        <form id="promotionForm">
            <div class="row mb-4">
                <div class="col-md-12 mb-3"><label class="form-label fw-bold">Name</label><input type="text" id="name" class="form-control" required></div>
                <div class="col-md-12 mb-3"><label class="form-label fw-bold">Detail</label><textarea id="detail" class="form-control" rows="2"></textarea></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Type</label><select id="type" class="form-select" required><option value="percent">Percent</option><option value="baht">Baht</option><option value="add">Free Item</option></select></div>
                <div class="col-md-3 mb-3"><label class="form-label fw-bold">Start Date</label><input type="datetime-local" id="startDate" class="form-control" required></div>
                <div class="col-md-3 mb-3"><label class="form-label fw-bold">End Date</label><input type="datetime-local" id="endDate" class="form-control" required></div>
            </div>
            <div class="row mb-4">
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Value (THB)</label><input type="number" step="0.01" min="0" id="value" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Percent</label><input type="number" step="0.01" min="0" id="percent" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Free Qty</label><input type="number" min="0" id="quantity" class="form-control"></div>
                <div class="col-md-12 mb-3"><label class="form-label fw-bold">Free Product</label><select id="freeProduct" class="form-select"><option value="">-- None --</option></select></div>
            </div>
            <div class="row mb-4">
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Min Spend</label><input type="number" step="0.01" min="0" id="minspend" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Required Qty</label><input type="number" min="0" id="reqQuantity" class="form-control"></div>
                <div class="col-md-12 mb-3"><label class="form-label fw-bold">Required Product</label><select id="reqProduct" class="form-select"><option value="">-- None --</option></select></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-5">Save</button>
                <button type="button" id="deleteBtn" class="btn btn-danger px-5 d-none">Delete</button>
                <a href="/promotion" class="btn btn-outline-secondary px-5">Cancel</a>
            </div>
        </form>
    </div>
    <script>
        const idMatch = location.pathname.match(/\/promotion\/edit\/(\d+)/);
        const promotionId = idMatch ? idMatch[1] : null;
        const title = document.getElementById('title');
        const errorMessage = document.getElementById('errorMessage');
        const deleteBtn = document.getElementById('deleteBtn');
        const fields = ['name','detail','type','startDate','endDate','value','percent','quantity','minspend','reqQuantity'];
        title.textContent = promotionId ? 'Edit Promotion' : 'Add Promotion';

        function toLocalDateTime(value) {
            if (!value) return '';
            const date = new Date(value);
            const offset = date.getTimezoneOffset();
            const local = new Date(date.getTime() - offset * 60000);
            return local.toISOString().slice(0,16);
        }

        async function loadProducts() {
            const response = await fetch('/api/products');
            const products = await response.json();
            const options = ['<option value="">-- None --</option>'].concat(products.map((p) => `<option value="${p.productId}">${p.productName}</option>`)).join('');
            document.getElementById('freeProduct').innerHTML = options;
            document.getElementById('reqProduct').innerHTML = options;
        }

        async function loadPromotion() {
            if (!promotionId) return;
            deleteBtn.classList.remove('d-none');
            const response = await fetch(`/api/promotions/${promotionId}`);
            const promo = await response.json();
            fields.forEach((field) => {
                if (field === 'startDate' || field === 'endDate') {
                    document.getElementById(field).value = toLocalDateTime(promo[field]);
                } else {
                    document.getElementById(field).value = promo[field] ?? '';
                }
            });
            document.getElementById('freeProduct').value = promo.freeProduct ? promo.freeProduct.productId : '';
            document.getElementById('reqProduct').value = promo.reqProduct ? promo.reqProduct.productId : '';
        }

        document.getElementById('promotionForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            errorMessage.classList.add('d-none');
            const body = {
                promotionId: promotionId ? Number(promotionId) : null,
                name: document.getElementById('name').value,
                detail: document.getElementById('detail').value,
                type: document.getElementById('type').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                value: document.getElementById('value').value || null,
                percent: document.getElementById('percent').value || null,
                quantity: document.getElementById('quantity').value || null,
                minspend: document.getElementById('minspend').value || null,
                reqQuantity: document.getElementById('reqQuantity').value || null,
                freeProduct: document.getElementById('freeProduct').value ? { productId: Number(document.getElementById('freeProduct').value) } : null,
                reqProduct: document.getElementById('reqProduct').value ? { productId: Number(document.getElementById('reqProduct').value) } : null
            };
            const response = await fetch(promotionId ? `/api/promotions/${promotionId}` : '/api/promotions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                errorMessage.textContent = 'Unable to save promotion';
                errorMessage.classList.remove('d-none');
                return;
            }
            location.href = '/promotion';
        });

        deleteBtn.addEventListener('click', async () => {
            if (!confirm('Delete this promotion?')) return;
            const response = await fetch(`/api/promotions/${promotionId}/delete`, { method: 'POST' });
            if (response.ok) location.href = '/promotion';
        });

        loadProducts().then(loadPromotion);
    </script>
</body>
</html>
