<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>จัดการโปรโมชั่น - Mookata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Kanit', sans-serif;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .promo-card {
            border-radius: 10px;
            border: 1px solid #eee;
            transition: transform 0.2s;
            height: 100%;
        }

        .promo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .badge-type {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-tags"></i> จัดการโปรโมชั่น</h2>
            <div>
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">🏠 หน้าหลัก</a>
                <button type="button" class="btn btn-info me-2 text-white" data-bs-toggle="modal"
                    data-bs-target="#checkCouponModal">
                    🔍 ตรวจสอบคูปอง
                </button>
                <a th:href="@{/promotions/new}" class="btn btn-success">+ เพิ่มโปรโมชั่นใหม่</a>
            </div>
        </div>

        <div class="modal fade" id="checkCouponModal" tabindex="-1" aria-labelledby="checkCouponModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title" id="checkCouponModalLabel">
                            <i class="bi bi-search"></i> ตรวจสอบสถานะคูปอง
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="couponCodeInput" class="form-label fw-bold">
                                ระบุรหัสคูปอง (ตัวอย่าง: TSM-XXXXXX)
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="couponCodeInput"
                                    placeholder="พิมพ์รหัสที่นี่...">
                                <button class="btn btn-primary" type="button" id="btnSearchCoupon">🔍 ค้นหา</button>
                            </div>
                        </div>
                        <hr>
                        <div id="couponResult" class="p-3 border rounded bg-light d-none">
                            <h6 class="fw-bold mb-2">ผลการตรวจสอบ:</h6>
                            <p class="mb-1">รหัส: <span id="resCode" class="fw-bold"></span></p>
                            <p class="mb-1">โปรโมชั่น: <span id="resPromo"></span></p>
                            <p class="mb-0">สถานะ: <span id="resStatus" class="badge"></span></p>
                            <div class="mt-3 pt-2 border-top">
                                <small class="text-muted d-block mb-2">เปลี่ยนสถานะเป็น:</small>
                                <div class="d-flex flex-wrap gap-2">
                                    <button class="btn btn-sm btn-success btn-status" data-status="ACTIVE">ACTIVE</button>
                                    <button class="btn btn-sm btn-danger btn-status" data-status="USED">USED</button>
                                    <button class="btn btn-sm btn-warning btn-status text-dark" data-status="EXPIRED">EXPIRED</button>
                                    <button class="btn btn-sm btn-secondary btn-status" data-status="CANCELED">CANCELED</button>
                                </div>
                            </div>
                        </div>
                        <div id="couponError" class="alert alert-danger d-none mt-2">
                            <i class="bi bi-exclamation-triangle"></i>
                            ไม่พบรหัสคูปองนี้ในระบบ หรือรหัสไม่ถูกต้อง
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="messageBox"></div>

        <div id="promoGrid" class="row g-4">
            <div class="col-12 text-center py-5 text-muted">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <script>
        const promoGrid = document.getElementById('promoGrid');
        const messageBox = document.getElementById('messageBox');

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('th-TH');
        }

        function showMessage(message, type = 'success') {
            messageBox.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${escapeHtml(message)}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        async function deletePromotion(id) {
            if (!confirm('ยืนยันการลบโปรโมชั่นนี้?')) return;

            try {
                const response = await fetch(`/api/promotions/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('ลบโปรโมชั่นไม่สำเร็จ');
                }

                showMessage('ลบโปรโมชั่นเรียบร้อยแล้ว');
                await loadPromotions();
            } catch (error) {
                showMessage(error.message || 'เกิดข้อผิดพลาด', 'danger');
            }
        }

        async function loadPromotions() {
            try {
                const response = await fetch('/api/promotions');

                if (!response.ok) {
                    throw new Error('โหลดโปรโมชั่นไม่สำเร็จ');
                }

                const promotions = await response.json();

                if (!promotions.length) {
                    promoGrid.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <h4 class="text-muted">ยังไม่มีโปรโมชั่นในระบบ</h4>
                        </div>
                    `;
                    return;
                }

                promoGrid.innerHTML = promotions.map((promo) => {
                    let conditionText = 'ไม่มีเงื่อนไขพิเศษ';
                    if (promo.minspend != null) {
                        conditionText = `ซื้อขั้นต่ำ ${escapeHtml(promo.minspend)} ฿`;
                    } else if (promo.reqProduct != null) {
                        conditionText = `ซื้อ ${escapeHtml(promo.reqProduct.productName)} x${escapeHtml(promo.reqQuantity)}`;
                    }

                    let rewardText = 'ไม่มีสิทธิพิเศษ';
                    if (promo.type === 'baht' && promo.value != null) {
                        rewardText = `ลดราคา ${escapeHtml(promo.value)} ฿`;
                    } else if (promo.type === 'percent' && promo.value != null) {
                        rewardText = `ลดราคา ${escapeHtml(promo.value)} %`;
                    } else if (promo.freeProduct != null) {
                        rewardText = `แถมฟรี ${escapeHtml(promo.freeProduct.productName)} x${escapeHtml(promo.quantity)}`;
                    }

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="card promo-card shadow-sm p-3 position-relative">
                                <span class="badge bg-primary badge-type">${escapeHtml(promo.type)}</span>
                                <h5 class="fw-bold text-dark mt-2">${escapeHtml(promo.name)}</h5>
                                <p class="text-muted small mb-3">${escapeHtml(promo.detail || '')}</p>

                                <div class="border-top pt-3 mt-auto">
                                    <div class="small mb-2">
                                        <span class="fw-bold">เงื่อนไข:</span>
                                        <span>${conditionText}</span>
                                    </div>

                                    <div class="small mb-3 text-success fw-bold">
                                        <i class="bi bi-gift"></i> สิทธิพิเศษ: ${rewardText}
                                    </div>

                                    <div class="small text-muted mb-3">
                                        <i class="bi bi-calendar3"></i>
                                        ${formatDate(promo.startDate)} - ${formatDate(promo.endDate)}
                                    </div>

                                    <div class="d-flex gap-2">
                                        <a href="/promotions/edit/${encodeURIComponent(promo.promotionId)}"
                                           class="btn btn-sm btn-outline-warning w-100">⚙️ แก้ไข</a>
                                        <button type="button"
                                                class="btn btn-sm btn-outline-danger w-100"
                                                onclick="deletePromotion(${promo.promotionId})">🗑️ ลบ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                promoGrid.innerHTML = `
                    <div class="col-12 text-center py-5 text-danger">
                        โหลดข้อมูลโปรโมชั่นไม่สำเร็จ
                    </div>
                `;
            }
        }

        loadPromotions();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('btnSearchCoupon').addEventListener('click', function () {
            const code = document.getElementById('couponCodeInput').value.trim();
            const resDiv = document.getElementById('couponResult');
            const errDiv = document.getElementById('couponError');

            if (!code) return;

            resDiv.classList.add('d-none');
            errDiv.classList.add('d-none');

            fetch(`/api/coupons/validate/${code}`)
                .then(response => {
                    if (!response.ok) throw new Error('Not found');
                    return response.json();
                })
                .then(data => {
                    document.getElementById('resCode').innerText = data.code;
                    document.getElementById('resPromo').innerText = data.promotion.name;

                    const badge = document.getElementById('resStatus');
                    badge.innerText = data.status;
                    badge.className = 'badge';

                    if (data.status === 'ACTIVE') badge.classList.add('bg-success');
                    else if (data.status === 'USED') badge.classList.add('bg-danger');
                    else if (data.status === 'EXPIRED') badge.classList.add('bg-warning', 'text-dark');
                    else if (data.status === 'CANCELED') badge.classList.add('bg-secondary');

                    resDiv.classList.remove('d-none');
                })
                .catch(() => {
                    errDiv.classList.remove('d-none');
                });
        });

        document.querySelectorAll('.btn-status').forEach(btn => {
            btn.addEventListener('click', function () {
                const code = document.getElementById('resCode').innerText;
                const newStatus = this.getAttribute('data-status');

                if (!code || !confirm(`คุณต้องการเปลี่ยนสถานะคูปอง ${code} เป็น ${newStatus}?`)) return;

                fetch(`/api/coupons/status/${code}/${newStatus}`, { method: 'POST' })
                    .then(response => {
                        if (response.ok) {
                            alert('อัปเดตสถานะเรียบร้อย!');
                            document.getElementById('btnSearchCoupon').click();
                        } else {
                            alert('เกิดข้อผิดพลาดในการอัปเดตสถานะ');
                        }
                    });
            });
        });
    </script>
</body>
</html>
