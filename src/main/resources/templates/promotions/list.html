<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotions - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    body { background-color: #f4f7f6; font-family: Tahoma, sans-serif; padding: 30px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .promo-card { border-radius: 10px; border: 1px solid #eee; transition: transform 0.2s; height: 100%; }
    .promo-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .badge-type { position: absolute; top: 10px; right: 10px; }
</style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-tags"></i> Promotions</h2>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">Home</a>
                <a href="/promotion/new" class="btn btn-success">+ Add Promotion</a>
            </div>
        </div>
        <div id="promoGrid" class="row g-4">
            <div class="col-12 text-center py-5 text-muted">Loading promotions...</div>
        </div>
    </div>
    <script>
        const promoGrid = document.getElementById('promoGrid');
        const escapeHtml = (value) => String(value ?? '')
            .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;').replaceAll("'", '&#39;');

        function formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleDateString();
        }

        async function loadPromotions() {
            const response = await fetch('/api/promotions');
            const promotions = await response.json();

            if (!promotions.length) {
                promoGrid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No promotions found.</div>';
                return;
            }

            promoGrid.innerHTML = promotions.map((promo) => `
                <div class="col-md-6 col-lg-4">
                    <div class="card promo-card shadow-sm p-3 position-relative">
                        <span class="badge bg-primary badge-type">${escapeHtml(promo.type)}</span>
                        <h5 class="fw-bold text-dark mt-2">${escapeHtml(promo.name)}</h5>
                        <p class="text-muted small mb-3">${escapeHtml(promo.detail || '')}</p>
                        <div class="border-top pt-3 mt-auto">
                            <div class="small mb-2">
                                <span class="fw-bold">Condition:</span>
                                ${promo.minspend != null ? `<span> Min ${escapeHtml(promo.minspend)} THB</span>` : ''}
                                ${promo.reqProduct != null ? `<span> Buy ${escapeHtml(promo.reqProduct.productName)} x${escapeHtml(promo.reqQuantity)}</span>` : ''}
                                ${promo.minspend == null && promo.reqProduct == null ? `<span>No special condition</span>` : ''}
                            </div>
                            <div class="small mb-3 text-success fw-bold">
                                ${promo.type === 'baht' && promo.value != null ? `Discount ${escapeHtml(promo.value)} THB` : ''}
                                ${promo.type === 'percent' ? `Discount ${escapeHtml(promo.percent ?? promo.value)}%` : ''}
                                ${promo.freeProduct != null ? `Free ${escapeHtml(promo.freeProduct.productName)} x${escapeHtml(promo.quantity)}` : ''}
                            </div>
                            <div class="small text-muted mb-3">${formatDate(promo.startDate)} - ${formatDate(promo.endDate)}</div>
                            <div class="d-flex gap-2">
                                <a href="/promotion/edit/${encodeURIComponent(promo.promotionId)}" class="btn btn-sm btn-outline-warning w-100">Edit</a>
                                <a href="/promotion/delete/${encodeURIComponent(promo.promotionId)}" class="btn btn-sm btn-outline-danger w-100" onclick="return confirm('Delete this promotion?')">Delete</a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        loadPromotions();
    </script>
</body>
</html>
