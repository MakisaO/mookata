<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>จัดการโปรโมชั่น - Mookata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Kanit', sans-serif;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .promo-card {
            border-radius: 10px;
            border: 1px solid #eee;
            transition: transform 0.2s;
            height: 100%;
        }

        .promo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .badge-type {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-tags"></i> จัดการโปรโมชั่น</h2>
            <div>
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">🏠 หน้าหลัก</a>
                <a href="/promotions/coupons" class="btn btn-info me-2 text-white">
                    <i class="bi bi-ticket-perforated"></i> จัดการคูปอง
                </a>
                <a th:href="@{/promotions/new}" class="btn btn-success">+ เพิ่มโปรโมชั่นใหม่</a>
            </div>
        </div>

        <div id="messageBox"></div>

        <div id="promoGrid" class="row g-4">
            <div class="col-12 text-center py-5 text-muted">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <script>
        const promoGrid = document.getElementById('promoGrid');
        const messageBox = document.getElementById('messageBox');

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('th-TH');
        }

        function showMessage(message, type = 'success') {
            messageBox.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${escapeHtml(message)}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        async function deletePromotion(id) {
            if (!confirm('ยืนยันการลบโปรโมชั่นนี้?')) return;

            try {
                const response = await fetch(`/api/promotions/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('ลบโปรโมชั่นไม่สำเร็จ');
                }

                showMessage('ลบโปรโมชั่นเรียบร้อยแล้ว');
                await loadPromotions();
            } catch (error) {
                showMessage(error.message || 'เกิดข้อผิดพลาด', 'danger');
            }
        }

        async function loadPromotions() {
            try {
                const response = await fetch('/api/promotions');

                if (!response.ok) {
                    throw new Error('โหลดโปรโมชั่นไม่สำเร็จ');
                }

                const promotions = await response.json();

                if (!promotions.length) {
                    promoGrid.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <h4 class="text-muted">ยังไม่มีโปรโมชั่นในระบบ</h4>
                        </div>
                    `;
                    return;
                }

                promoGrid.innerHTML = promotions.map((promo) => {
                    let conditionText = 'ไม่มีเงื่อนไขพิเศษ';
                    if (promo.minspend != null) {
                        conditionText = `ซื้อขั้นต่ำ ${escapeHtml(promo.minspend)} ฿`;
                    } else if (promo.reqProduct != null) {
                        conditionText = `ซื้อ ${escapeHtml(promo.reqProduct.productName)} x${escapeHtml(promo.reqQuantity)}`;
                    }

                    let rewardText = 'ไม่มีสิทธิพิเศษ';
                    if (promo.type === 'baht' && promo.value != null) {
                        rewardText = `ลดราคา ${escapeHtml(promo.value)} ฿`;
                    } else if (promo.type === 'percent' && promo.value != null) {
                        rewardText = `ลดราคา ${escapeHtml(promo.value)} %`;
                    } else if (promo.freeProduct != null) {
                        rewardText = `แถมฟรี ${escapeHtml(promo.freeProduct.productName)} x${escapeHtml(promo.quantity)}`;
                    }

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="card promo-card shadow-sm p-3 position-relative">
                                <span class="badge bg-primary badge-type">${escapeHtml(promo.type)}</span>
                                <h5 class="fw-bold text-dark mt-2">${escapeHtml(promo.name)}</h5>
                                <p class="text-muted small mb-3">${escapeHtml(promo.detail || '')}</p>

                                <div class="border-top pt-3 mt-auto">
                                    <div class="small mb-2">
                                        <span class="fw-bold">เงื่อนไข:</span>
                                        <span>${conditionText}</span>
                                    </div>

                                    <div class="small mb-3 text-success fw-bold">
                                        <i class="bi bi-gift"></i> สิทธิพิเศษ: ${rewardText}
                                    </div>

                                    <div class="small text-muted mb-3">
                                        <i class="bi bi-calendar3"></i>
                                        ${formatDate(promo.startDate)} - ${formatDate(promo.endDate)}
                                    </div>

                                    <div class="d-flex gap-2">
                                        <a href="/promotions/edit/${encodeURIComponent(promo.promotionId)}"
                                           class="btn btn-sm btn-outline-warning w-100">⚙️ แก้ไข</a>
                                        <button type="button"
                                                class="btn btn-sm btn-outline-danger w-100"
                                                onclick="deletePromotion(${promo.promotionId})">🗑️ ลบ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                promoGrid.innerHTML = `
                    <div class="col-12 text-center py-5 text-danger">
                        โหลดข้อมูลโปรโมชั่นไม่สำเร็จ
                    </div>
                `;
            }
        }

        loadPromotions();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
