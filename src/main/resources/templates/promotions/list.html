<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>จัดการโปรโมชั่น - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; padding: 30px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .promo-card { border-radius: 10px; border: 1px solid #eee; transition: transform 0.2s; height: 100%; }
    .promo-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .badge-type { position: absolute; top: 10px; right: 10px; }
</style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-tags"></i> จัดการโปรโมชั่น</h2>
            <div>
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">🏠 หน้าหลัก</a>
                <button type="button" class="btn btn-info me-2 text-white" data-bs-toggle="modal" data-bs-target="#checkCouponModal">
                    🔍 ตรวจสอบคูปอง
                </button>
                <a th:href="@{/promotion/new}" class="btn btn-success">+ เพิ่มโปรโมชั่นใหม่</a>
            </div>
        </div>

        <!-- SEARCH MODAL -->
        <div class="modal fade" id="checkCouponModal" tabindex="-1" aria-labelledby="checkCouponModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title" id="checkCouponModalLabel"><i class="bi bi-search"></i> ตรวจสอบสถานะคูปอง</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="couponCodeInput" class="form-label fw-bold">ระบุรหัสคูปอง (ตัวอย่าง: TSM-XXXXXX)</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="couponCodeInput" placeholder="พิมพ์รหัสที่นี่...">
                                <button class="btn btn-primary" type="button" id="btnSearchCoupon">🔍 ค้นหา</button>
                            </div>
                        </div>
                        <hr>
                        <div id="couponResult" class="p-3 border rounded bg-light d-none">
                            <h6 class="fw-bold mb-2">ผลการตรวจสอบ:</h6>
                            <p class="mb-1">รหัส: <span id="resCode" class="fw-bold"></span></p>
                            <p class="mb-1">โปรโมชั่น: <span id="resPromo"></span></p>
                            <p class="mb-0">สถานะ: <span id="resStatus" class="badge"></span></p>
                        </div>
                        <div id="couponError" class="alert alert-danger d-none mt-2">
                            <i class="bi bi-exclamation-triangle"></i> ไม่พบรหัสคูปองนี้ในระบบ หรือรหัสไม่ถูกต้อง
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="promo : ${promotions}">
                <div class="card promo-card shadow-sm p-3 position-relative">
                    <span class="badge bg-primary badge-type" th:text="${promo.type}">Type</span>
                    <h5 class="fw-bold text-dark mt-2" th:text="${promo.name}">Promotion Name</h5>
                    <p class="text-muted small mb-3" th:text="${promo.detail}">Details...</p>
                    
                    <div class="border-top pt-3 mt-auto">
                        <div class="small mb-2">
                            <span class="fw-bold">เงื่อนไข:</span>
                            <span th:if="${promo.minspend != null}" th:text="'ซื้อขั้นต่ำ ' + ${promo.minspend} + ' ฿'"></span>
                            <span th:if="${promo.reqProduct != null}" th:text="'ซื้อ ' + ${promo.reqProduct.productName} + ' x' + ${promo.reqQuantity}"></span>
                            <span th:if="${promo.minspend == null && promo.reqProduct == null}">ไม่มีเงื่อนไขพิเศษ</span>
                        </div>
                        <div class="small mb-3 text-success fw-bold">
                            <i class="bi bi-gift"></i> สิทธิพิเศษ: 
                            <span th:if="${promo.type == 'baht' && promo.value != null}" th:text="'ลดราคา ' + ${promo.value} + ' ฿'"></span>
                            <span th:if="${promo.type == 'percent'}" th:text="'ลดราคา ' + (${promo.percent != null ? promo.percent : promo.value}) + ' %'"></span>
                            <span th:if="${promo.freeProduct != null}" th:text="'แถมฟรี ' + ${promo.freeProduct.productName} + ' x' + ${promo.quantity}"></span>
                        </div>
                        
                        <div class="small text-muted mb-3">
                            <i class="bi bi-calendar3"></i> 
                            <span th:text="${#dates.format(promo.startDate, 'dd/MM/yy')}"></span> - 
                            <span th:text="${#dates.format(promo.endDate, 'dd/MM/yy')}"></span>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/promotion/edit/{id}(id=${promo.promotionId})}" class="btn btn-sm btn-outline-warning w-100">⚙️ แก้ไข</a>
                            <a th:href="@{/promotion/delete/{id}(id=${promo.promotionId})}" 
                               class="btn btn-sm btn-outline-danger w-100"
                               onclick="return confirm('ยืนยันการลบโปรโมชั่นนี้?')">🗑️ ลบ</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(promotions)}" class="col-12 text-center py-5">
                <h4 class="text-muted">ยังไม่มีโปรโมชั่นในระบบ</h4>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.getElementById('btnSearchCoupon').addEventListener('click', function() {
        const code = document.getElementById('couponCodeInput').value.trim();
        const resDiv = document.getElementById('couponResult');
        const errDiv = document.getElementById('couponError');
        
        if(!code) return;
        
        // ล้างค่าเก่า
        resDiv.classList.add('d-none');
        errDiv.classList.add('d-none');

        // เรียก API
        fetch(`/api/coupons/validate/${code}`)
            .then(response => {
                if(!response.ok) throw new Error('Not found');
                return response.json();
            })
            .then(data => {
                document.getElementById('resCode').innerText = data.code;
                document.getElementById('resPromo').innerText = data.promotion.name;
                
                const badge = document.getElementById('resStatus');
                badge.innerText = data.status;
                badge.className = 'badge'; // reset
                
                // กำหนดสีตามสถานะ
                if(data.status === 'ACTIVE') badge.classList.add('bg-success');
                else if(data.status === 'USED') badge.classList.add('bg-danger');
                else if(data.status === 'EXPIRED') badge.classList.add('bg-warning', 'text-dark');
                else if(data.status === 'CANCELED') badge.classList.add('bg-secondary');
                
                resDiv.classList.remove('d-none');
            })
            .catch(error => {
                errDiv.classList.remove('d-none');
            });
    });
    </script>
</body>
</html>
