<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Mookata</title>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #ff5722; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .detail-col { text-align: left; max-width: 250px; font-size: 13px; color: #666; word-wrap: break-word; }
        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; color: white; font-size: 14px; border: none; cursor: pointer; }
        .btn-add { background-color: #4CAF50; margin-bottom: 20px; display: inline-block; }
        .btn-edit { background-color: #ff9800; }
        .btn-home { background-color: #607d8b; margin-top: 20px; display: inline-block; }
        .search-container { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; gap: 16px; }
        .search-box { display: flex; gap: 10px; align-items: center; }
        .search-input { padding: 9px; border: 1px solid #ddd; border-radius: 5px; width: 250px; font-size: 14px; }
        .sort-btn { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background-color: rgba(255, 255, 255, 0.2); color: white; text-decoration: none; border-radius: 3px; font-size: 12px; margin-left: 5px; cursor: pointer; border: none; }
        .sort-btn.active { background-color: white; color: #ff5722; font-weight: bold; }
        .pagination { display: flex; list-style: none; padding: 0; justify-content: center; gap: 5px; margin-top: 30px; }
        .page-link { padding: 8px 14px; border: 1px solid #ddd; text-decoration: none; color: #333; border-radius: 4px; font-size: 14px; background: white; cursor: pointer; }
        .page-link.active { background-color: #ff5722; color: white; border-color: #ff5722; font-weight: bold; }
        .page-link:disabled { color: #ccc; background-color: #f9f9f9; cursor: not-allowed; }
        .empty { text-align: center; padding: 40px; color: #888; background: #f9f9f9; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Menu Management</h2>

        <div class="search-container">
            <a href="/menu/new" class="btn btn-add">+ Add Menu Item</a>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search menu name...">
            </div>
        </div>

        <div id="tableWrap"></div>
        <div id="pagination"></div>
        <a href="/" class="btn btn-home">Back Home</a>
    </div>

    <script>
        const state = new URLSearchParams(window.location.search);
        let currentPage = Number(state.get('page') || '1');
        let keyword = state.get('keyword') || '';
        let sortField = state.get('sortField') || 'productId';
        let sortDir = state.get('sortDir') || 'asc';
        const searchInput = document.getElementById('searchInput');
        const tableWrap = document.getElementById('tableWrap');
        const pagination = document.getElementById('pagination');
        let timeout = null;

        searchInput.value = keyword;

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function setQuery() {
            const params = new URLSearchParams();
            params.set('page', currentPage);
            if (keyword) params.set('keyword', keyword);
            params.set('sortField', sortField);
            params.set('sortDir', sortDir);
            history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`);
        }

        function toggleSort(field) {
            if (sortField === field) {
                sortDir = sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortDir = 'asc';
            }
            currentPage = 1;
            loadMenu();
        }

        function sortIndicator(field) {
            if (sortField !== field) return '↕';
            return sortDir === 'asc' ? '↑' : '↓';
        }

        async function loadMenu() {
            setQuery();
            tableWrap.innerHTML = '<div class="empty">Loading menu...</div>';
            pagination.innerHTML = '';

            const params = new URLSearchParams({
                page: currentPage,
                sortField,
                sortDir
            });
            if (keyword) params.set('keyword', keyword);

            const response = await fetch(`/api/menu?${params.toString()}`);
            const data = await response.json();

            if (!data.totalItems) {
                tableWrap.innerHTML = '<div class="empty">No menu items found.</div>';
                return;
            }

            tableWrap.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Category <button class="sort-btn ${sortField === 'categories.categoriesName' ? 'active' : ''}" onclick="toggleSort('categories.categoriesName')">${sortIndicator('categories.categoriesName')}</button></th>
                            <th>Name <button class="sort-btn ${sortField === 'productName' ? 'active' : ''}" onclick="toggleSort('productName')">${sortIndicator('productName')}</button></th>
                            <th>Detail</th>
                            <th>Price <button class="sort-btn ${sortField === 'productPrice' ? 'active' : ''}" onclick="toggleSort('productPrice')">${sortIndicator('productPrice')}</button></th>
                            <th>Status <button class="sort-btn ${sortField === 'productStatus' ? 'active' : ''}" onclick="toggleSort('productStatus')">${sortIndicator('productStatus')}</button></th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.products.map((product) => `
                            <tr>
                                <td>${escapeHtml(product.categories ? product.categories.categoriesName : '-')}</td>
                                <td style="text-align: left; font-weight: bold;">${escapeHtml(product.productName)}</td>
                                <td class="detail-col">${escapeHtml(product.productDetail || '')}</td>
                                <td>${escapeHtml(product.productPrice)}</td>
                                <td style="color:${product.productStatus === 'available' ? 'green' : 'red'}">${product.productStatus === 'available' ? 'Available' : 'Unavailable'}</td>
                                <td><a href="/menu/edit/${encodeURIComponent(product.productId)}" class="btn btn-edit">Edit</a></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            if (data.totalPages > 1) {
                pagination.innerHTML = `<ul class="pagination">
                    <li><button class="page-link" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">Prev</button></li>
                    ${Array.from({ length: data.totalPages }, (_, index) => index + 1).map((page) => `
                        <li><button class="page-link ${page === currentPage ? 'active' : ''}" onclick="goPage(${page})">${page}</button></li>
                    `).join('')}
                    <li><button class="page-link" ${currentPage >= data.totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next</button></li>
                </ul>`;
            }
        }

        function goPage(page) {
            currentPage = page;
            loadMenu();
        }

        searchInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                keyword = searchInput.value.trim();
                currentPage = 1;
                loadMenu();
            }, 250);
        });

        loadMenu();
    </script>
</body>
</html>
