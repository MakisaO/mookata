<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>จัดการเมนูอาหาร - Mookata</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #ff5722; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* สไตล์เพิ่มเติมสำหรับรายละเอียด */
        .detail-col { 
            text-align: left; 
            max-width: 250px; 
            font-size: 13px; 
            color: #666;
            word-wrap: break-word; /* ให้ตัดคำถ้าข้อความยาวเกิน */
        }

        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; color: white; font-size: 14px; }
        .btn-add { background-color: #4CAF50; margin-bottom: 20px; display: inline-block; }
        .btn-edit { background-color: #ff9800; }
        .btn-home { background-color: #607d8b; margin-top: 20px; display: inline-block; }
        
        .search-container { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .search-box { display: flex; gap: 10px; align-items: center; }
        .search-input { padding: 9px; border: 1px solid #ddd; border-radius: 5px; width: 250px; font-size: 14px; }
        .btn-search { background-color: #2196F3; margin: 0; display: inline-block; }
        .btn-clear { background-color: #9e9e9e; margin: 0; display: inline-block; }
        
        .pagination { display: flex; list-style: none; padding: 0; justify-content: center; gap: 5px; margin-top: 30px; }
        .page-item { margin: 0; }
        .page-link { padding: 8px 14px; border: 1px solid #ddd; text-decoration: none; color: #333; border-radius: 4px; font-size: 14px; }
        .page-item.active .page-link { background-color: #ff5722; color: white; border-color: #ff5722; font-weight: bold; }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #f9f9f9;}
        
        .sort-link { color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .sort-link:hover { text-decoration: underline; }

        .sort-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 5px;
            transition: background-color 0.2s;
        }
        .sort-btn:hover { background-color: rgba(255, 255, 255, 0.4); }
        .sort-btn.active { background-color: white; color: #ff5722; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 รายการเมนูอาหารในร้าน</h2>
        
        <div class="search-container">
            <a th:href="@{/menu/new}" class="btn btn-add" style="margin-bottom:0;">+ เพิ่มเมนูอาหารใหม่</a>
            
            <form th:action="@{/menu}" method="get" class="search-box" id="searchForm">
                <input type="text" name="keyword" class="search-input" id="searchInput" placeholder="ค้นหาชื่อเมนู..." th:value="${keyword}">
                <input type="hidden" name="sortField" th:value="${sortField}">
                <input type="hidden" name="sortDir" th:value="${sortDir}">
            </form>
        </div>
        
        <table th:if="${totalItems > 0}">
            <thead>
                <tr>
                    <th>
                        หมวดหมู่
                        <a th:href="@{/menu(page=${currentPage}, keyword=${keyword}, sortField='categories.categoriesName', sortDir=${sortField == 'categories.categoriesName' ? reverseSortDir : 'asc'})}" 
                           class="sort-btn" th:classappend="${sortField == 'categories.categoriesName'} ? 'active'">
                            <span th:text="${sortField == 'categories.categoriesName' ? (sortDir == 'asc' ? '↑' : '↓') : '↕'}">↕</span>
                        </a>
                    </th>
                    <th>
                        ชื่อเมนู
                        <a th:href="@{/menu(page=${currentPage}, keyword=${keyword}, sortField='productName', sortDir=${sortField == 'productName' ? reverseSortDir : 'asc'})}" 
                           class="sort-btn" th:classappend="${sortField == 'productName'} ? 'active'">
                            <span th:text="${sortField == 'productName' ? (sortDir == 'asc' ? '↑' : '↓') : '↕'}">↕</span>
                        </a>
                    </th>
                    <th>รายละเอียด</th> 
                    <th>
                        ราคา
                        <a th:href="@{/menu(page=${currentPage}, keyword=${keyword}, sortField='productPrice', sortDir=${sortField == 'productPrice' ? reverseSortDir : 'asc'})}" 
                           class="sort-btn" th:classappend="${sortField == 'productPrice'} ? 'active'">
                            <span th:text="${sortField == 'productPrice' ? (sortDir == 'asc' ? '↑' : '↓') : '↕'}">↕</span>
                        </a>
                    </th>
                    <th>
                        สถานะ
                        <a th:href="@{/menu(page=${currentPage}, keyword=${keyword}, sortField='productStatus', sortDir=${sortField == 'productStatus' ? reverseSortDir : 'asc'})}" 
                           class="sort-btn" th:classappend="${sortField == 'productStatus'} ? 'active'">
                            <span th:text="${sortField == 'productStatus' ? (sortDir == 'asc' ? '↑' : '↓') : '↕'}">↕</span>
                        </a>
                    </th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.categories != null ? p.categories.categoriesName : '-'}" style="font-size: 14px; color: #555;">หมวดหมู่</td>

                    <td th:text="${p.productName}" style="text-align: left; font-weight: bold;">ชุดหมูรวมมิตร</td>
                    
                    <td th:text="${p.productDetail}" class="detail-col">รายละเอียดสินค้าจะแสดงที่นี่</td>
                    
                    <td th:text="${p.productPrice}">299</td>
                    
                    <td>
                        <span th:text="${p.productStatus == 'available' ? 'พร้อมขาย' : 'หมด'}"
                              th:style="${p.productStatus == 'available' ? 'color: green;' : 'color: red;'}">
                        </span>
                    </td>
                    
                    <td>
                        <a th:href="@{/menu/edit/{id}(id=${p.productId})}" class="btn btn-edit">แก้ไข</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${totalItems == 0}" style="text-align: center; padding: 40px; color: #888; background: #f9f9f9; border-radius: 5px; margin-top: 20px;">
            <p>ไม่พบรายการอาหารที่ค้นหา</p>
        </div>
        
        <div th:if="${totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/menu(page=${currentPage - 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}">« ก่อนหน้า</a>
                </li>
                
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/menu(page=${i}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}" th:text="${i}">1</a>
                </li>
                
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/menu(page=${currentPage + 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir})}">ถัดไป »</a>
                </li>
            </ul>
        </div>
        
        <a th:href="@{/}" class="btn btn-home">กลับหน้าหลัก</a>
    </div>

    <script>
        let timeout = null;
        const searchInput = document.getElementById('searchInput');
        if(searchInput) {
            // Keep focus and put cursor at the end
            const val = searchInput.value;
            searchInput.focus();
            searchInput.value = '';
            searchInput.value = val;

            searchInput.addEventListener('input', function (e) {
                clearTimeout(timeout);
                timeout = setTimeout(function () {
                    document.getElementById('searchForm').submit();
                }, 200); // 200ms debounce
            });
        }
    </script>
</body>
</html>
