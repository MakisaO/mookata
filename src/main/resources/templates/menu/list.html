<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการเมนูอาหาร - Mookata</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #ff5722; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .detail-col { 
            text-align: left; 
            max-width: 250px; 
            font-size: 13px; 
            color: #666;
            word-wrap: break-word; 
        }

        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; color: white; font-size: 14px; cursor: pointer; border: none; }
        .btn-add { background-color: #4CAF50; margin-bottom: 20px; display: inline-block; }
        .btn-edit { background-color: #ff9800; }
        .btn-home { background-color: #607d8b; margin-top: 20px; display: inline-block; }
        
        .search-container { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .search-box { display: flex; gap: 10px; align-items: center; }
        .search-input { padding: 9px; border: 1px solid #ddd; border-radius: 5px; width: 250px; font-size: 14px; }
        
        .pagination { display: flex; list-style: none; padding: 0; justify-content: center; gap: 5px; margin-top: 30px; }
        .page-item { margin: 0; }
        .page-link { padding: 8px 14px; border: 1px solid #ddd; text-decoration: none; color: #333; border-radius: 4px; font-size: 14px; cursor: pointer; background: white; }
        .page-item.active .page-link { background-color: #ff5722; color: white; border-color: #ff5722; font-weight: bold; }
        .page-item.disabled .page-link { color: #ccc; pointer-events: none; background-color: #f9f9f9;}
        
        .sort-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 5px;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
        }
        .sort-btn:hover { background-color: rgba(255, 255, 255, 0.4); }
        .sort-btn.active { background-color: white; color: #ff5722; font-weight: bold; }

        #loading-overlay { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 รายการเมนูอาหารในร้าน</h2>
        
        <div class="search-container">
            <!-- ปรับให้ส่งไปหน้าฟอร์มที่ฝั่ง Backend เพิ่ม Route ไว้ -->
            <a href="/menu/new" class="btn btn-add">+ เพิ่มเมนูอาหารใหม่</a>
            
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาชื่อเมนู...">
            </div>
        </div>
        
        <table id="productTable">
            <thead>
                <tr>
                    <th>
                        หมวดหมู่
                        <button onclick="changeSort('categories.categoriesName')" id="sort-categories" class="sort-btn">↕</button>
                    </th>
                    <th>
                        ชื่อเมนู
                        <button onclick="changeSort('productName')" id="sort-productName" class="sort-btn">↕</button>
                    </th>
                    <th>รายละเอียด</th> 
                    <th>
                        ราคา
                        <button onclick="changeSort('productPrice')" id="sort-productPrice" class="sort-btn">↕</button>
                    </th>
                    <th>
                        สถานะ
                        <button onclick="changeSort('productStatus')" id="sort-productStatus" class="sort-btn">↕</button>
                    </th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="productBody">
                <!-- Data will be loaded here via JavaScript -->
            </tbody>
        </table>
        
        <div id="noDataMessage" style="display: none; text-align: center; padding: 40px; color: #888; background: #f9f9f9; border-radius: 5px; margin-top: 20px;">
            <p>ไม่พบรายการอาหารที่ค้นหา</p>
        </div>

        <div id="paginationContainer">
            <!-- Pagination will be loaded here -->
        </div>
        
        <a href="/" class="btn btn-home">กลับหน้าหลัก</a>
    </div>

    <script>
        let currentPage = 1;
        let currentKeyword = '';
        let currentSortField = 'productId';
        let currentSortDir = 'asc';
        let searchTimeout = null;

        const API_BASE = '/api/menu';

        // 1. ฟังก์ชันโหลดข้อมูลหลัก
        async function fetchProducts() {
            const tbody = document.getElementById('productBody');
            const noData = document.getElementById('noDataMessage');
            
            try {
                const url = `${API_BASE}?page=${currentPage}&keyword=${currentKeyword}&sortField=${currentSortField}&sortDir=${currentSortDir}`;
                const response = await fetch(url);
                const data = await response.json();

                renderTable(data.products);
                renderPagination(data.totalPages, data.currentPage);
                updateSortButtons();

                noData.style.display = data.products.length === 0 ? 'block' : 'none';
                
            } catch (error) {
                console.error('Error loading products:', error);
                tbody.innerHTML = '<tr><td colspan="6" style="color:red">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            }
        }

        // 2. ฟังก์ชันวาดตาราง
        function renderTable(products) {
            const tbody = document.getElementById('productBody');
            tbody.innerHTML = '';

            products.forEach(p => {
                const row = document.createElement('tr');
                const catName = p.categories ? p.categories.categoriesName : '-';
                const statusText = p.productStatus === 'available' ? 'พร้อมขาย' : 'หมด';
                const statusColor = p.productStatus === 'available' ? 'green' : 'red';

                row.innerHTML = `
                    <td style="font-size: 14px; color: #555;">${catName}</td>
                    <td style="text-align: left; font-weight: bold;">${p.productName}</td>
                    <td class="detail-col">${p.productDetail || ''}</td>
                    <td>${p.productPrice}</td>
                    <td><span style="color: ${statusColor}">${statusText}</span></td>
                    <td>
                        <a href="/menu/edit/${p.productId}" class="btn btn-edit">แก้ไข</a>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 3. ฟังก์ชันวาดเลขหน้า (Pagination)
        function renderPagination(totalPages, activePage) {
            const container = document.getElementById('paginationContainer');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<ul class="pagination">';
            
            // ปุ่มก่อนหน้า
            html += `<li class="page-item ${activePage === 1 ? 'disabled' : ''}">
                        <a class="page-link" onclick="goToPage(${activePage - 1})">« ก่อนหน้า</a>
                     </li>`;

            // เลขหน้า
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${activePage === i ? 'active' : ''}">
                            <a class="page-link" onclick="goToPage(${i})">${i}</a>
                         </li>`;
            }

            // ปุ่มถัดไป
            html += `<li class="page-item ${activePage === totalPages ? 'disabled' : ''}">
                        <a class="page-link" onclick="goToPage(${activePage + 1})">ถัดไป »</a>
                     </li>`;

            html += '</ul>';
            container.innerHTML = html;
        }

        // 4. ระบบค้นหา (Search Debounce)
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentKeyword = e.target.value;
                currentPage = 1; // ค้นหาใหม่หน้าแรกเสมอ
                fetchProducts();
            }, 300);
        });

        // 5. ระบบจัดเรียง (Sort)
        function changeSort(field) {
            if (currentSortField === field) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortDir = 'asc';
            }
            fetchProducts();
        }

        function updateSortButtons() {
            // Reset all icons
            const btns = document.querySelectorAll('.sort-btn');
            btns.forEach(b => {
                b.classList.remove('active');
                b.innerText = '↕';
            });

            // Set active icon
            const activeBtn = document.getElementById(`sort-${currentSortField.replace('.', '\\.')}`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.innerText = currentSortDir === 'asc' ? '↑' : '↓';
            }
        }

        function goToPage(page) {
            currentPage = page;
            fetchProducts();
        }

        // เริ่มโหลดข้อมูล
        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
