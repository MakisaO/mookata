<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Form - Mookata</title>
    <style>
        body { font-family: Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-save, .btn-delete-form { width: 100%; padding: 12px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; text-decoration:none; display:block; text-align:center; }
        .btn-save { background-color: #4CAF50; }
        .btn-delete-form { background-color: #f44336; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h3 id="title">Menu Form</h3>
        <div id="message" style="color:#dc3545;"></div>
        <form id="productForm">
            <input type="hidden" id="productId">
            <label>Category:</label>
            <select id="categoryId"></select>
            <label>Menu Name:</label>
            <input type="text" id="productName" required>
            <label>Detail:</label>
            <textarea id="productDetail" rows="3"></textarea>
            <label>Price:</label>
            <input type="number" step="0.01" id="productPrice" required>
            <label>Status:</label>
            <select id="productStatus">
                <option value="available">Available</option>
                <option value="unavailable">Unavailable</option>
            </select>
            <button type="submit" class="btn-save">Save</button>
            <button type="button" id="deleteBtn" class="btn-delete-form" style="display:none;">Delete</button>
        </form>
        <a href="/menu" class="back-link">Back to Menu</a>
    </div>
    <script>
        const idMatch = location.pathname.match(/\/menu\/edit\/(\d+)/);
        const productId = idMatch ? idMatch[1] : null;
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const categoryId = document.getElementById('categoryId');
        const productName = document.getElementById('productName');
        const productDetail = document.getElementById('productDetail');
        const productPrice = document.getElementById('productPrice');
        const productStatus = document.getElementById('productStatus');
        const deleteBtn = document.getElementById('deleteBtn');

        title.textContent = productId ? 'Edit Menu' : 'Add Menu';

        async function loadCategories() {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            categoryId.innerHTML = categories.map((cat) => `<option value="${cat.categoriesId}">${cat.categoriesName}</option>`).join('');
        }

        async function loadProduct() {
            if (!productId) return;
            deleteBtn.style.display = 'block';
            const response = await fetch(`/api/products/${productId}`);
            const product = await response.json();
            categoryId.value = product.categories ? product.categories.categoriesId : '';
            productName.value = product.productName || '';
            productDetail.value = product.productDetail || '';
            productPrice.value = product.productPrice || '';
            productStatus.value = product.productStatus || 'available';
        }

        document.getElementById('productForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            message.textContent = '';
            const body = {
                productId: productId ? Number(productId) : null,
                productName: productName.value,
                productDetail: productDetail.value,
                productPrice: productPrice.value,
                productStatus: productStatus.value,
                categories: { categoriesId: Number(categoryId.value) }
            };
            const response = await fetch(productId ? `/api/products/${productId}` : '/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                message.textContent = 'Unable to save menu item';
                return;
            }
            location.href = '/menu';
        });

        deleteBtn.addEventListener('click', async () => {
            if (!confirm('Delete this menu item?')) return;
            const response = await fetch(`/api/products/${productId}/delete`, { method: 'POST' });
            if (response.ok) location.href = '/menu';
        });

        loadCategories().then(loadProduct);
    </script>
</body>
</html>
