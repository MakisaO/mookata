<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>บันทึกข้อมูลเมนู - Mookata</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h3 { text-align: center; color: #333; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        label { font-weight: bold; color: #555; }
        
        .btn-save { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-save:hover { background-color: #45a049; }
        
        .btn-delete-form { 
            display: block; width: 100%; padding: 12px; background-color: #f44336; color: white; 
            text-align: center; text-decoration: none; border-radius: 5px; font-size: 16px; 
            box-sizing: border-box; margin-top: 10px; cursor: pointer; border: none;
        }
        .btn-delete-form:hover { background-color: #d32f2f; }
        
        .back-link { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
        #loading-overlay { display: none; text-align: center; margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <div class="form-card">
        <h3 id="formTitle">📝 ข้อมูลเมนู</h3>
        
        <form id="menuForm">
            <input type="hidden" id="productId" />
            
            <label>หมวดหมู่สินค้า:</label>
            <select id="categoryId" required>
                <option value="">-- โปรดเลือกหมวดหมู่ --</option>
            </select>

            <label>ชื่อเมนูอาหาร:</label>
            <input type="text" id="productName" placeholder="เช่น สามชั้นสไลด์" required />
            
            <label>รายละเอียดเมนู:</label>
            <textarea id="productDetail" placeholder="ระบุรายละเอียด เช่น ความเผ็ด, ปริมาณกรัม..." rows="3"></textarea>
            
            <label>ราคา (บาท):</label>
            <input type="number" step="0.01" id="productPrice" placeholder="0.00" required />
            
            <label>สถานะสินค้า:</label>
            <select id="productStatus" required>
                <option value="available">พร้อมขาย</option>
                <option value="unavailable">หมด</option>
            </select>
            
            <button type="submit" class="btn-save" id="saveButton">บันทึกข้อมูล</button>

            <button type="button" id="deleteButton" class="btn-delete-form" style="display: none;">ลบเมนูนี้</button>
        </form>
        
        <div id="loading-overlay">กำลังโหลด...</div>
        <a href="/menu" class="back-link">ยกเลิกและกลับหน้าจัดการข่าว</a>
    </div>

    <script>
        const API_BASE = '/api/menu';
        const form = document.getElementById('menuForm');
        const deleteBtn = document.getElementById('deleteButton');
        
        // ดึง productId จาก URL (ถ้ามี) เช่น /menu/edit/123
        const pathParts = window.location.pathname.split('/');
        const idFromUrl = pathParts[pathParts.length - 1];
        const isEditMode = !isNaN(idFromUrl) && idFromUrl !== '';

        async function initForm() {
            // 1. โหลดหมวดหมู่ทั้งหมดก่อน
            await fetchCategories();

            // 2. ถ้าเป็นโหมดแก้ไข ให้โหลดข้อมูลเดิมมาเติม
            if (isEditMode) {
                document.getElementById('formTitle').innerText = '📝 แก้ไขข้อมูลเมนู';
                await loadProductData(idFromUrl);
                deleteBtn.style.display = 'block';
            }
        }

        async function fetchCategories() {
            try {
                const response = await fetch(`${API_BASE}/categories`);
                const categories = await response.json();
                const select = document.getElementById('categoryId');
                
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.categoriesId;
                    opt.innerText = cat.categoriesName;
                    select.appendChild(opt);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProductData(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                if (!response.ok) throw new Error('Not found');
                const p = await response.json();

                document.getElementById('productId').value = p.productId;
                document.getElementById('productName').value = p.productName;
                document.getElementById('productDetail').value = p.productDetail || '';
                document.getElementById('productPrice').value = p.productPrice;
                document.getElementById('productStatus').value = p.productStatus;
                
                if (p.categories) {
                    document.getElementById('categoryId').value = p.categories.categoriesId;
                }
            } catch (error) {
                alert('ไม่พบข้อมูลสินค้านี้');
                window.location.href = '/menu';
            }
        }

        // บันทึกข้อมูล (Create or Update)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveButton');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            const payload = {
                productId: isEditMode ? parseInt(document.getElementById('productId').value) : null,
                productName: document.getElementById('productName').value,
                productDetail: document.getElementById('productDetail').value,
                productPrice: parseFloat(document.getElementById('productPrice').value),
                productStatus: document.getElementById('productStatus').value,
                categories: {
                    categoriesId: parseInt(document.getElementById('categoryId').value)
                }
            };

            try {
                const url = isEditMode ? `${API_BASE}/${idFromUrl}` : API_BASE;
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('บันทึกข้อมูลเรียบร้อยแล้ว');
                    window.location.href = '/menu';
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
                btn.disabled = false;
                btn.innerText = 'บันทึกข้อมูล';
            }
        });

        // ลบข้อมูล
        deleteBtn.addEventListener('click', async () => {
            if (!confirm('⚠️ ยืนยันการลบเมนูนี้ออกจากระบบ?')) return;

            try {
                const response = await fetch(`${API_BASE}/${idFromUrl}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('ลบข้อมูลเรียบร้อยแล้ว');
                    window.location.href = '/menu';
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการลบข้อมูล');
            }
        });

        document.addEventListener('DOMContentLoaded', initForm);
    </script>
</body>
</html>
