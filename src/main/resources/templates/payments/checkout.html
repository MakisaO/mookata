<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Mookata</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body { background-color: #f8f9fa; font-family: Tahoma, sans-serif; }
.checkout-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; }
.header-bg { background: linear-gradient(135deg, #1976D2, #2196F3); color: white; border-radius: 15px 15px 0 0; }
</style>
</head>
<body>
<div class="container py-5" style="max-width: 800px;">
    <div class="card checkout-card">
        <div class="card-header header-bg p-4">
            <h3 class="mb-0 text-center">Checkout Table <span id="tableIdLabel"></span></h3>
        </div>
        <div class="card-body p-4">
            <div id="errorMessage" class="alert alert-danger d-none"></div>

            <h5 class="mb-3">Ordered Items</h5>
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Unit Price</th>
                            <th class="text-end">Total</th>
                        </tr>
                    </thead>
                    <tbody id="checkoutRows">
                        <tr><td colspan="4" class="text-center text-muted">Loading checkout...</td></tr>
                    </tbody>
                </table>
            </div>

            <hr class="my-4">

            <div class="row mb-3">
                <div class="col-6"><h5 class="text-muted">Subtotal:</h5></div>
                <div class="col-6 text-end"><h5 id="originalTotal">0.00 THB</h5></div>
            </div>

            <div id="promotionBlock" class="row mb-3 d-none">
                <div class="col-12">
                    <div class="alert alert-success py-2">
                        <ul id="promoMessages" class="mb-0 ps-3"></ul>
                    </div>
                </div>
                <div class="col-6"><h5 class="text-danger">Discount:</h5></div>
                <div class="col-6 text-end"><h5 id="discountTotal" class="text-danger">0.00 THB</h5></div>
            </div>

            <hr class="my-4">

            <div class="row mb-4">
                <div class="col-6"><h4>Final Total:</h4></div>
                <div class="col-6 text-end"><h3 id="finalTotal" class="text-primary fw-bold">0.00 THB</h3></div>
            </div>

            <button class="btn btn-success btn-lg w-100 py-3 fw-bold" type="button" onclick="confirmPayment()">
                Confirm Payment
            </button>
            <a href="/tables" class="btn btn-outline-secondary w-100 mt-2 py-2">Back to Tables</a>
        </div>
    </div>
</div>

<script>
    const tableId = window.location.pathname.split('/').filter(Boolean).pop();
    const tableIdLabel = document.getElementById('tableIdLabel');
    const errorBox = document.getElementById('errorMessage');
    const checkoutRows = document.getElementById('checkoutRows');
    const originalTotal = document.getElementById('originalTotal');
    const promotionBlock = document.getElementById('promotionBlock');
    const promoMessages = document.getElementById('promoMessages');
    const discountTotal = document.getElementById('discountTotal');
    const finalTotal = document.getElementById('finalTotal');

    tableIdLabel.textContent = tableId;

    function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove('d-none');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    async function loadCheckout() {
        checkoutRows.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Loading checkout...</td></tr>';
        errorBox.classList.add('d-none');

        try {
            const response = await fetch(`/api/payments/checkout/table/${tableId}`);
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.message || 'Unable to load checkout');
            }

            renderCheckout(payload);
        } catch (error) {
            checkoutRows.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Failed to load checkout.</td></tr>';
            showError(error.message);
        }
    }

    function renderCheckout(payload) {
        const items = payload.aggregatedOrders || [];
        checkoutRows.innerHTML = items.length ? items.map((item) => `
            <tr>
                <td>${escapeHtml(item.product.productName)}</td>
                <td>${escapeHtml(item.quantity)}</td>
                <td>${escapeHtml(item.unitPrice)} THB</td>
                <td class="text-end fw-bold text-primary">${escapeHtml(item.totalPrice)} THB</td>
            </tr>
        `).join('') : '<tr><td colspan="4" class="text-center text-muted">No active items.</td></tr>';

        originalTotal.textContent = `${payload.originalTotal} THB`;
        finalTotal.textContent = `${payload.finalTotal} THB`;

        if ((payload.promoMessages || []).length || Number(payload.discount) > 0) {
            promotionBlock.classList.remove('d-none');
            promoMessages.innerHTML = (payload.promoMessages || []).map((message) => `<li>${escapeHtml(message)}</li>`).join('');
            discountTotal.textContent = `- ${payload.discount} THB`;
        } else {
            promotionBlock.classList.add('d-none');
            promoMessages.innerHTML = '';
        }
    }

    async function confirmPayment() {
        const result = await Swal.fire({
            title: 'Confirm payment?',
            text: 'This will close the active order for the table.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#28a745',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Confirm',
            cancelButtonText: 'Cancel'
        });

        if (!result.isConfirmed) {
            return;
        }

        try {
            const response = await fetch(`/api/payments/checkout/table/${tableId}`, { method: 'POST' });
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.message || 'Unable to complete payment');
            }

            await Swal.fire({
                title: 'Completed',
                text: payload.message,
                icon: 'success',
                confirmButtonColor: '#28a745'
            });
            window.location.href = '/tables';
        } catch (error) {
            showError(error.message);
        }
    }

    loadCheckout();
</script>
</body>
</html>
