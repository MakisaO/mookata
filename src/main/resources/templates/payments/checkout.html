<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ชำระเงินโต๊ะ - Mookata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Kanit', sans-serif;
        }

        .checkout-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: none;
        }

        .header-bg {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border-radius: 15px 15px 0 0;
        }
    </style>
</head>

<body>
    <div class="container py-5" style="max-width: 1200px;">
        <div class="card checkout-card">
            <div class="card-header header-bg p-4">
                <h3 class="mb-0 text-center">🧾 ชำระเงิน ค่าอาหารโต๊ะ <span th:text="${tableId}"></span></h3>
            </div>
            <div class="card-body p-4">
                
                <div id="alert-container"></div>

                <div class="row g-4" id="checkout-content">
                    <!-- Left Column: Order Items -->
                    <div class="col-lg-8">
                        <h5 class="mb-3">รายการอาหารทั้งหมด</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered">
                                <thead class="table-light">
                                    <tr>
                                        <th>รายการที่สั่ง</th>
                                        <th>จำนวน</th>
                                        <th>ราคา/หน่วย</th>
                                        <th class="text-end">ราคารวม</th>
                                    </tr>
                                </thead>
                                <tbody id="order-items-container">
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-muted">
                                            <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div> กำลังโหลดข้อมูล...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Right Column: Payment Summary & Actions -->
                    <div class="col-lg-4">
                        <div class="bg-light p-4 rounded-3 border">
                            <h5 class="mb-4">สรุปยอดชำระเงิน</h5>

                            <div class="row mb-3">
                                <div class="col-6"><span class="text-muted">ยอดรวม:</span></div>
                                <div class="col-6 text-end">
                                    <span class="fw-bold" id="original-total">0.00 บาท</span>
                                </div>
                            </div>

                            <!-- แสดงโปรโมชั่นที่มีในร้าน -->
                            <div class="mb-4" id="promotions-block" style="display: none;">
                                <h6 class="text-muted mb-2 small">📢 โปรโมชั่นของทางร้าน </h6>
                                <h6 class="text-muted mb-2 small">(คูปองจะถูกใช้โดยอัตโนมัติ)</h6>
                                <div class="card border-0 bg-white p-2 rounded-2" style="font-size: 0.85rem;">
                                    <ul class="mb-0 text-secondary ps-3" id="promotions-list">
                                    </ul>
                                </div>
                            </div>

                            <div id="discount-block" style="display: none;">
                                <div class="alert alert-success py-2 mb-3" style="font-size: 0.9rem;">
                                    <ul class="mb-0 ps-3" id="promo-messages">
                                    </ul>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6"><span class="text-danger fw-bold">ส่วนลด:</span></div>
                                    <div class="col-6 text-end">
                                        <span class="text-danger fw-bold" id="discount-amount">-0.00 บาท</span>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <div class="row mb-4">
                                <div class="col-12">
                                    <h6 class="text-muted mb-1">ยอดสุทธิที่ต้องชำระ:</h6>
                                    <h3 class="text-emerald-600 fw-bold text-end" id="final-total">0.00 บาท</h3>
                                </div>
                            </div>

                            <!-- Partner Rewards Section -->
                            <div id="partner-rewards-block" class="mb-4" style="display: none;">
                                <h6 class="text-muted mb-2 small font-bold flex align-items-center">
                                    <i class="fa-solid fa-gift me-1 text-emerald-500"></i> สิทธิพิเศษจากร้านไอติม (ลุ้นรับฟรี1สิทธิ์!)
                                </h6>
                                <div id="partner-rewards-list" class="small">
                                    <!-- Dynamic content -->
                                </div>
                            </div>

                            <button class="btn btn-success btn-lg w-100 py-3 fw-bold mb-3 shadow-sm border-0" type="button" onclick="confirmPayment()" id="btn-pay" disabled style="background-color: #059669;">
                                💸 ยืนยันชำระเงิน
                            </button>
                            <a href="/tables" class="btn btn-outline-secondary w-100 py-2">กลับไปหน้าจัดการร้าน</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tableId = window.location.pathname.split('/').pop();
        let currentFinalTotal = 0;

        function showAlert(message, type = 'danger') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }

        async function loadPaymentData() {
            try {
                const response = await fetch('/api/payments/checkout/table/' + tableId);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'ไม่สามารถโหลดข้อมูลได้');
                }

                renderPaymentData(data);
                
                // เปิดปุ่มชำระเงิน
                document.getElementById('btn-pay').removeAttribute('disabled');
            } catch (error) {
                console.error(error);
                showAlert(error.message);
                document.getElementById('order-items-container').innerHTML = `
                    <tr><td colspan="4" class="text-center text-danger py-4">❌ เกิดข้อผิดพลาด: ${error.message}</td></tr>
                `;
            }
        }

        function renderPaymentData(data) {
            // 1. วาดตาราง Order Items
            const tbody = document.getElementById('order-items-container');
            if (data.aggregatedOrders && data.aggregatedOrders.length > 0) {
                let rowsHtml = '';
                data.aggregatedOrders.forEach(summary => {
                    rowsHtml += `
                        <tr>
                            <td>${summary.product ? summary.product.productName : 'สินค้า'}</td>
                            <td>${summary.quantity}</td>
                            <td>${summary.unitPrice} ฿</td>
                            <td class="text-end fw-bold text-primary">${summary.totalPrice} ฿</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = rowsHtml;
            } else {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4">ไม่มีรายการอาหาร</td></tr>`;
            }

            // 2. อัปเดตยอดรวมเริ่มต้น
            document.getElementById('original-total').innerText = data.originalTotal + " บาท";

            // 3. จัดการโปรโมชั่นที่มีในร้าน
            if (data.allPromotions && data.allPromotions.length > 0) {
                document.getElementById('promotions-block').style.display = 'block';
                const promoList = document.getElementById('promotions-list');
                let promosHtml = '';
                data.allPromotions.forEach(promo => {
                    let detail = '';
                    if (promo.type === 'discount' || promo.type === 'baht' || promo.type === 'percent') {
                        detail = `ลด <span class="fw-bold">${promo.value}</span> ${promo.type === 'percent' ? '%' : 'บาท'}`;
                    } else if (promo.type === 'add' || promo.type === 'free_item') {
                        const freeName = promo.freeProduct ? promo.freeProduct.productName : 'สินค้า';
                        detail = `แถมฟรี <span class="fw-bold">${freeName}</span>`;
                    }
                    promosHtml += `<li><span class="fw-bold">${promo.name}</span>: ${detail}</li>`;
                });
                promoList.innerHTML = promosHtml;
            }

            // 4. แสดงข้อความส่วนลดที่ได้รับ (ถ้ามี)
            if (data.discount > 0 || (data.promoMessages && data.promoMessages.length > 0)) {
                document.getElementById('discount-block').style.display = 'block';
                const msgList = document.getElementById('promo-messages');
                let msgsHtml = '';
                if (data.promoMessages) {
                    data.promoMessages.forEach(msg => {
                        msgsHtml += `<li>${msg}</li>`;
                    });
                }
                msgList.innerHTML = msgsHtml;
                document.getElementById('discount-amount').innerText = "-" + data.discount + " บาท";
            } else {
                document.getElementById('discount-block').style.display = 'none';
            }

            // 5. อัปเดตยอดสุทธิ
            currentFinalTotal = data.finalTotal;
            document.getElementById('final-total').innerText = data.finalTotal + " บาท";

            // 6. จัดการโปรโมชั่นร้านเพื่อน (Dynamic Mapping)
            if (data.partnerPromotions && data.partnerPromotions.length > 0) {
                const partnerBlock = document.getElementById('partner-rewards-block');
                const partnerList = document.getElementById('partner-rewards-list');
                partnerBlock.style.display = 'block';
                
                let html = '';
                data.partnerPromotions.forEach(p => {
                    const remaining = p.ourMinAmount - data.finalTotal;
                    if (remaining <= 0) {
                        html += `
                            <div class="alert alert-warning py-2 mb-2 border-0 bg-warning bg-opacity-10 text-dark" style="font-size: 0.85rem;">
                                <i class="fa-solid fa-star text-warning me-1"></i> <b>คุณมีสิทธิ์ได้รับ:</b> ${p.name}
                            </div>`;
                    } else {
                        html += `
                            <div class="p-2 mb-2 bg-light rounded-2 border-start border-4 border-emerald-400" style="font-size: 0.85rem;">
                                <span class="text-muted">สั่งอีก <b class="text-emerald-600">${remaining.toFixed(2)}.-</b> เพื่อลุ้น:</span><br>
                                <span class="text-dark fw-medium">${p.name}</span>
                            </div>`;
                    }
                });
                partnerList.innerHTML = html;
            } else {
                document.getElementById('partner-rewards-block').style.display = 'none';
            }
        }

        function confirmPayment() {
            Swal.fire({
                title: 'ยืนยันการชำระเงิน?',
                text: "โต๊ะนี้จะถูกล้างบิลและกลับเป็นโต๊ะว่างทันที",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#d33',
                confirmButtonText: 'ยืนยันชำระเงิน',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        Swal.fire({
                            title: 'กำลังดำเนินการ...',
                            allowOutsideClick: false,
                            didOpen: () => { Swal.showLoading(); }
                        });

                        const response = await fetch('/api/payments/save/table/' + tableId, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ finalTotal: currentFinalTotal })
                        });
                        
                        const resultData = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(resultData.message || 'เกิดข้อผิดพลาดในการชำระเงิน');
                        }

                        // สำเร็จ
                        let successText = resultData.message;
                        let successIcon = 'success';
                        let successTitle = 'ชำระเงินสำเร็จ!';
                        
                        if (resultData.partnerCoupon) {
                            successTitle = 'ยินดีด้วย! คุณได้รับคูปองพิเศษ';
                            const coupon = resultData.partnerCoupon;
                            successText = `
                                <div class="text-center">
                                    <p class="mb-3">${resultData.message}</p>
                                    <div class="bg-emerald-50 border-2 border-emerald-500 border-dashed p-4 rounded-3">
                                        <p class="text-emerald-800 fw-bold mb-1">คูปองร้านไอติม: ${coupon.promotionName}</p>
                                        <h2 class="text-emerald-600 fw-bold mb-0" style="letter-spacing: 2px;">${coupon.code}</h2>
                                    </div>
                                    <p class="mt-3 text-muted small">นำรหัสนี้ไปแสดงที่ร้านไอติมเพื่อรับสิทธิ์เลยย!</p>
                                </div>
                            `;
                        }

                        await Swal.fire({
                            icon: successIcon,
                            title: successTitle,
                            html: successText,
                            confirmButtonText: 'กลับหน้าหลัก',
                            confirmButtonColor: '#059669'
                        });
                        
                        window.location.href = '/tables';
                    } catch (error) {
                        console.error("Payment error:", error);
                        Swal.fire({
                            icon: 'error',
                            title: 'ผิดพลาด',
                            text: error.message
                        });
                    }
                }
            });
        }

        // เริ่มต้นโหลดเมื่อหน้าพร้อม
        document.addEventListener("DOMContentLoaded", () => {
            loadPaymentData();
        });
    </script>
</body>
</html>
