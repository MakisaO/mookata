
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Customer index Page</title>
<link rel="stylesheet"
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
	integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
	crossorigin="anonymous">
</head>
<body>
	<div class="container my-2" align="center">

		<h3>Employee List</h3>

		<a th:href="@{/customers/create}" class="btn btn-primary btn-sm mb-3">Add
			Employee</a>
		<table style="width: 80%" border="1"
			class="table table-striped table-responsive-md">
			<thead>
				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="customer:${customersList}">
					<td th:text="${customer.cusId}"></td>
					<td th:text="${customer.name}"></td>

					<td>
					<table>
						<thead>
							<tr>
							   <th></th>
							   <th></th>
							</tr>
						</thead>
						<tbody>
						
						   <tr>
						      <td> 
						      	<a th:href="@{/customers/edit/{id}(id=${customer.cusId})}" class="btn btn-primary">Update</a>
						      </td>
						      <td>
						      	<form action="#" th:action="@{/customers/delete}"
									th:object="${customer}" method="post">
									<input type="hidden" th:value="${customer.cusId}" th:attr="name='cusId'"/>
									<input type="submit" value="delete" class="btn btn-primary">
								</form>
							  </td>
						
						   </tr>
						</tbody>
					</table>
						

						</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>
</html>
